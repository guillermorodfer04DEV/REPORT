<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | TECNO TOOL</title>
    <link rel="icon" type="image/png" href="TECNO-TOOL-icon.png">
    <style>
        :root {
            --tecno-blue: #0056b3;
            --tecno-gradient: linear-gradient(135deg, #0056b3 0%, #002d5f 100%);
            --tecno-dark: #0f172a;
            --bg-body: #edf2f7;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 86, 179, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 86, 179, 0.05) 0px, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--tecno-dark);
        }

        /* --- Contenedor Estilo Mockup --- */
        .main-card {
            width: 90%; max-width: 800px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            position: relative;
        }

        .logo-container {
            width: 100px; height: 100px;
            margin: 0 auto 15px;
            background: var(--white);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .logo-img { width: 70px; height: auto; }

        h1 { 
            font-size: 28px; font-weight: 800; margin-bottom: 35px;
            background: var(--tecno-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- Grid Escalable --- */
        .menu-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(2, 1fr); /* Móvil: 2 columnas */
        }

        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); } /* PC: 3 columnas */
        }

        /* --- Botones --- */
        .btn-nav {
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 20px;
            text-decoration: none;
            color: var(--tecno-dark);
            display: flex; flex-direction: column; align-items: center;
            transition: var(--transition);
            font-weight: 600; font-size: 14px;
        }

        .btn-nav:hover {
            transform: translateY(-5px);
            border-color: var(--tecno-blue);
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.1);
        }

        .btn-nav img { width: 40px; height: 40px; margin-bottom: 12px; object-fit: contain; }
        .btn-nav i { font-size: 35px; margin-bottom: 12px; font-style: normal; }

        .on-work {
            border: 2px dashed #cbd5e1;
            background: rgba(255,255,255,0.4);
            color: #94a3b8;
            cursor: default;
        }

        /* --- Modales --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        .modal-content {
            background: var(--white); padding: 40px; border-radius: 28px;
            width: 320px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #e2e8f0;
            box-sizing: border-box; font-size: 16px;
        }

        .btn-primary {
            width: 100%; padding: 12px; background: var(--tecno-gradient);
            color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        footer { margin-top: 30px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <div class="logo-container" style="width: 60px; height: 60px;">
                <img src="TECNO-TOOL-icon.png" class="logo-img" style="width: 40px;">
            </div>
            <h2>Iniciar Sesión</h2>
            <input type="text" id="userIn" placeholder="Usuario">
            <input type="password" id="passIn" placeholder="Contraseña">
            <button class="btn-primary" onclick="login()">Entrar</button>
        </div>
    </div>

    <div class="main-card">
        <div class="logo-container">
            <img src="TECNO-TOOL-icon.png" alt="Logo" class="logo-img">
        </div>
        <h1>TECNO Tool</h1>

        <div class="menu-grid" id="gridContainer">
            </div>

        <footer>TECNO Mobile Venezuela &copy; 2026</footer>
    </div>

    <script>
        // CONFIGURACIÓN ESCALABLE
        const configBotones = [
            { nombre: "Entrada", link: "reporte-entrada.html", icono: "entrada.png", emoji: "📍" },
            { nombre: "Reporte Diario", link: "reporte.html", icono: "reporte.png", emoji: "📝" },
            { nombre: "Equipos", link: "equipos.html", icono: "phone.png", emoji: "📱" },
            { nombre: "Material POP", link: "pop.html", icono: "box.png", emoji: "🎁" },
            { nombre: "Binance ID", link: "binance.html", icono: "binance.png", emoji: "🔶" }
        ];

        function cargarMenu() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = "";

            configBotones.forEach(btn => {
                const item = document.createElement('a');
                item.href = btn.link;
                item.className = 'btn-nav';
                // Lógica de fallback: Si la imagen falla, muestra el emoji
                item.innerHTML = `
                    <img src="${btn.icono}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                    <i style="display:none">${btn.emoji}</i>
                    <span>${btn.nombre}</span>
                `;
                container.appendChild(item);
            });

            // Siempre al final
            const work = document.createElement('div');
            work.className = 'btn-nav on-work';
            work.innerHTML = `<i>🛠️</i><span>On work...</span>`;
            container.appendChild(work);
        }

        async function login() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            
            try {
                const resp = await fetch('https://GuillermoDev.pythonanywhere.com/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await resp.json();
                if(data.success) {
                    document.getElementById('loginModal').style.display = 'none';
                    localStorage.setItem('tecno_session', 'active');
                    cargarMenu();
                } else {
                    alert("Error: " + data.message);
                }
            } catch(e) {
                alert("Asegúrate de que el servidor de Python esté corriendo.");
            }
        }

        // Verificar sesión al cargar
        if(localStorage.getItem('tecno_session') === 'active') {
            document.getElementById('loginModal').style.display = 'none';
            cargarMenu();
        }
    </script>
</body>
</html>
