<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | TECNO TOOL</title>
    <link rel="icon" type="image/png" href="https://guillermorodfer04dev.github.io/REPORT/TECNO-TOOL-icon.png">
    <style>
        :root {
            --tecno-blue: #0056b3;
            --tecno-gradient: linear-gradient(135deg, #0056b3 0%, #002d5f 100%);
            --tecno-dark: #0f172a;
            --bg-body: #edf2f7;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 86, 179, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 86, 179, 0.05) 0px, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--tecno-dark);
        }

        /* --- Badge de Usuario --- */
        .user-badge {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 20px;
            font-size: 14px; font-weight: 600;
            color: var(--tecno-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 1000; display: none;
            cursor: pointer; transition: var(--transition);
            animation: fadeInUp 0.5s ease-out;
        }

        .user-badge:hover { transform: translateY(-2px); background: var(--white); }

        .dev-tag {
            background-color: var(--tecno-dark);
            color: var(--white); font-size: 10px;
            padding: 2px 6px; border-radius: 8px;
            margin-left: 8px; display: none;
        }

        /* --- Modal con Centrado Corregido --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--white); padding: 30px; border-radius: 24px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.4s ease-out;
            box-sizing: border-box; /* Asegura que el padding no rompa el ancho */
        }

        .modal-content h2 { margin-top: 0; font-size: 22px; color: var(--tecno-dark); }

        .modal-content input {
            width: 100%; /* Ocupa el 100% del contenedor centrado */
            padding: 12px 15px; border: 1px solid #e2e8f0;
            border-radius: 12px; margin: 20px 0; 
            font-family: inherit; font-size: 16px;
            box-sizing: border-box; /* CORRECCIÓN DE CENTRADO */
            text-align: center;
        }

        /* --- Contenedor Principal --- */
        .container {
            text-align: center; width: 90%; max-width: 420px;
            padding: 50px 30px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .logo-container {
            background: var(--white); width: 200px; height: 200px;
            margin: 0 auto 25px; display: flex; align-items: center;
            justify-content: center; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.1);
        }

        .logo { width: 180px; }
        h1 { font-size: 28px; font-weight: 800; background: var(--tecno-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .menu-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }

        .btn-nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background-color: var(--white);
            color: var(--tecno-dark); text-decoration: none;
            font-weight: 600; border: 1px solid #e2e8f0;
            border-radius: 14px; transition: var(--transition);
        }

        .btn-nav:hover { border-color: var(--tecno-blue); transform: translateX(5px); }
        .btn-nav.accent { background: var(--tecno-gradient); color: var(--white); border: none; }

        #devPanelBtn { background-color: var(--tecno-dark); color: white; border: none; }

        footer { position: absolute; bottom: 30px; font-size: 11px; color: #94a3b8; font-weight: 600; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    
    <div id="userBadge" class="user-badge" title="Haz clic para cambiar de nombre">
        <i>👤</i> <span id="displayUserName"></span>
        <span id="devTag" class="dev-tag">DEV</span>
    </div>

    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modalTitle">¡Bienvenido!</h2>
            <p id="modalDesc">Ingresa tu nombre para comenzar.</p>
            <input type="text" id="nameInput" placeholder="Tu nombre aquí..." autocomplete="off">
            <button id="saveNameBtn" class="btn-nav accent" style="width: 100%; justify-content: center; cursor: pointer;">Guardar y Actualizar</button>
        </div>
    </div>

    <div class="container">
        <div class="logo-container">
            <img src="https://guillermorodfer04dev.github.io/REPORT/TECNO-TOOL-icon.png" alt="TECNO Logo" class="logo">
        </div>
        <h1>TECNO Tool</h1>
        
        <div class="menu-grid">
            <a href="reporte-entrada.html" class="btn-nav accent">
                <i>📍</i> <span>Reporte de Entrada</span> <b>▶</b>
            </a>
            <a href="reporte.html" class="btn-nav">
                <i>📝</i> <span>Reporte Diario</span> <b>▶</b>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1rWnxzCo7ttoErCXVy1yk6HIyHTtlDMWFr25gm71aqa0/edit?gid=646746000#gid=646746000" class="btn-nav">
                <i>🔲</i> <span>Imei QR Generator</span> <b>▶</b>
            </a>
            <a href="reporte-SUPERVISOR.html" id="devPanelBtn" class="btn-nav" style="display: none;">
                <i>⚙️📝</i> <span>Reporte Diario (Supervisor)</span> <b>▶</b>
            </a>
        </div>
    </div>

    <footer>TECNO Mobile Venezuela &copy; 2026</footer>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("welcomeModal");
        const nameInput = document.getElementById("nameInput");
        const saveBtn = document.getElementById("saveNameBtn");
        const userBadge = document.getElementById("userBadge");
        const displayUserName = document.getElementById("displayUserName");
        const devTag = document.getElementById("devTag");
        const devPanelBtn = document.getElementById("devPanelBtn");

        // --- Configuración de Usuarios y Colores ---
        const configUsuarios = [
            { nombre: "Guillermo Rodriguez", color: "#10750d" }, // Verde
            { nombre: "José Díaz", color: "#4823cc" },           // Azul
            { nombre: "José Reina", color: "#dd57b5" },          // Rosa
            { nombre: "Alexandra Guaimare", color: "#000000" }   // Negro
        ];

        const developersList = ["guillermo rodriguez", "jose diaz"];

        const cleanText = (text) => {
            if (!text) return "";
            return text.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
        };

        const actualizarAvatar = (nombre) => {
            const iconoUser = document.querySelector(".user-badge i");
            if (!iconoUser) return;
            const nombreLimpio = cleanText(nombre);
            const coincidencia = configUsuarios.find(u => cleanText(u.nombre) === nombreLimpio);

            if (coincidencia) {
                iconoUser.innerHTML = `<span style="display: inline-block; width: 12px; height: 12px; background-color: ${coincidencia.color}; border-radius: 50%; margin-right: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.2);"></span>`;
            } else {
                iconoUser.innerHTML = "👤";
            }
        };

        const checkRole = (name) => {
            const cleanedInput = cleanText(name);
            return developersList.some(dev => cleanText(dev) === cleanedInput || cleanedInput.includes(cleanText(dev))) ? "dev" : "user";
        };

        const applyPermissions = (role) => {
            const isDev = role === "dev";
            devTag.style.display = isDev ? "inline-block" : "none";
            devPanelBtn.style.display = isDev ? "flex" : "none";
        };

        const updateInterface = (name) => {
            const currentRole = checkRole(name);
            displayUserName.textContent = name;
            userBadge.style.display = "block";
            applyPermissions(currentRole);
            actualizarAvatar(name); // <-- Llamada al sistema de círculos de color
            
            localStorage.setItem("tecno_user_name", name);
            localStorage.setItem("tecno_user_role", currentRole);
        };

        const loadUser = () => {
            const savedName = localStorage.getItem("tecno_user_name");
            if (savedName) {
                updateInterface(savedName);
            } else {
                modal.style.display = "flex";
            }
        };

        // Eventos
        userBadge.addEventListener("click", () => {
            modal.style.display = "flex";
            nameInput.value = localStorage.getItem("tecno_user_name") || "";
            nameInput.focus();
        });

        saveBtn.addEventListener("click", () => {
            const newName = nameInput.value.trim();
            if (newName !== "") {
                updateInterface(newName);
                modal.style.display = "none";
            }
        });

        nameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") saveBtn.click(); });

        loadUser();
    });
</script>
</body>
</html>
