<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | TECNO TOOL</title>
    <style>
        :root {
            --tecno-blue: #0056b3;
            --tecno-dark: #0f172a;
            --bg-body: #edf2f7;
            --white: #ffffff;
            --border: #2b2b2b;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            display: flex; justify-content: center;
        }

        /* --- Estructura Principal --- */
        .container {
            width: 100%; max-width: 800px;
            background: var(--white);
            border: 4px solid var(--border);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Linea diagonal decorativa del mockup */
        .container::before {
            content: ''; position: absolute;
            top: -50px; left: -50px; width: 150px; height: 150px;
            border-bottom: 4px solid var(--border);
            transform: rotate(-45deg);
        }

        /* --- Cabecera --- */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 40px; position: relative; z-index: 1;
        }

        .logo-circle {
            width: 80px; height: 80px;
            border: 4px solid var(--border); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: var(--white); font-weight: bold;
        }

        .title { font-size: 32px; font-weight: bold; margin: 0; }
        .settings-icon { font-size: 30px; cursor: pointer; }

        /* --- Cuadrícula Dinámica --- */
        .menu-grid {
            display: grid;
            gap: 20px;
            /* Móvil por defecto: 2 columnas */
            grid-template-columns: repeat(2, 1fr);
        }

        /* PC: 3 columnas */
        @media (min-width: 600px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* --- Botones --- */
        .btn-nav {
            display: flex; flex-direction: row; align-items: center; justify-content: center;
            padding: 15px; border: 3px solid var(--border); border-radius: 12px;
            text-decoration: none; color: var(--tecno-dark); font-weight: 600;
            transition: all 0.2s; background: var(--white); gap: 10px;
        }

        .btn-nav:hover { transform: translateY(-3px); box-shadow: 4px 4px 0px var(--border); }
        
        .btn-icon { width: 30px; height: 30px; object-fit: contain; }
        .btn-emoji { font-size: 24px; font-style: normal; }

        .on-work { border: 3px dashed var(--border); color: #666; pointer-events: none; }

        /* --- Modales (Ocultos por defecto) --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { background: white; padding: 30px; border: 4px solid var(--border); width: 300px; text-align: center; }
        .modal input { width: 90%; padding: 10px; margin: 10px 0; border: 2px solid var(--border); }
        .modal button { padding: 10px 20px; border: 2px solid var(--border); background: var(--tecno-blue); color: white; cursor: pointer; font-weight: bold; }
        .modal button:hover { background: var(--tecno-dark); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="intentarLogin()">Ingresar</button>
        </div>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2>Crear Usuario</h2>
            <input type="text" id="newUser" placeholder="Nuevo Usuario">
            <input type="password" id="newPass" placeholder="Contraseña">
            <button onclick="crearUsuario()">Guardar y Enviar</button>
            <button onclick="document.getElementById('createModal').style.display='none'" style="background: #ccc; color: black; margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo-circle">LOGO</div>
            <h1 class="title">TECNO TOOL</h1>
            <div class="settings-icon" id="btnAjustes" style="display:none;" onclick="abrirMenuDev()" title="Panel Dev">⚙️</div>
        </div>
        
        <div class="menu-grid" id="menuGrid">
            </div>
    </div>

    <script>

        // ==========================================
        // 1. SISTEMA ESCALABLE DE BOTONES (ARRAY)
        // ==========================================
        // Para agregar un botón, solo añade un objeto a esta lista.
        const appButtons = [
            { name: "Entrada", link: "reporte-entrada.html", icon: "entrada.png", emoji: "📍" },
            { name: "Reporte Diario", link: "reporte.html", icon: "diario.png", emoji: "📝" },
            { name: "Disponibles", link: "equiposDisponibles.html", icon: "equipos.png", emoji: "📱" },
            { name: "Material POP", link: "gestionPOP.html", icon: "pop.png", emoji: "🛍️" },
            { name: "Binance ID", link: "generador-binance.html", icon: "binance.png", emoji: "🔶" },
        ];

        function renderizarBotones() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = ''; // Limpiar

            appButtons.forEach(btn => {
                const a = document.createElement('a');
                a.href = btn.link;
                a.className = 'btn-nav';
                
                // Lógica Inteligente de Iconos: Intenta cargar el PNG, si falla (onerror), muestra el emoji.
                a.innerHTML = `
                    <img src="${btn.icon}" alt="icon" class="btn-icon" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
                    <i class="btn-emoji" style="display:none;">${btn.emoji}</i>
                    <span>${btn.name}</span>
                `;
                grid.appendChild(a);
            });

            // Agregar el botón "On work..." SIEMPRE al final
            const onWork = document.createElement('div');
            onWork.className = 'btn-nav on-work';
            onWork.innerHTML = '<span>On work...</span>';
            grid.appendChild(onWork);
        }

        renderizarBotones();

        // ==========================================
        // 2. LÓGICA DE INICIO DE SESIÓN
        // ==========================================
        const API_URL = "http://127.0.0.1:5000"; // URL de tu backend Flask

        async function intentarLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById('loginModal').style.display = 'none';
                    if(data.role === 'dev') {
                        document.getElementById('btnAjustes').style.display = 'block';
                    }
                } else {
                    alert("Credenciales incorrectas");
                }
            } catch (e) {
                alert("Asegúrate de que el servidor de Python esté corriendo.");
            }
        }

        function abrirMenuDev() {
            document.getElementById('createModal').style.display = 'flex';
        }

        async function crearUsuario() {
            const newUser = document.getElementById('newUser').value;
            const newPass = document.getElementById('newPass').value;

            const res = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: newUser, password: newPass })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) document.getElementById('createModal').style.display = 'none';
        }
    </script>
</body>
</html>
