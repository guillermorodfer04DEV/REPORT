<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | TECNO TOOL</title>
    <link rel="icon" type="image/png" href="TECNO-TOOL-icon.png">
    <style>
        :root {
            --tecno-blue: #0056b3;
            --tecno-gradient: linear-gradient(135deg, #0056b3 0%, #002d5f 100%);
            --tecno-dark: #0f172a;
            --bg-body: #edf2f7;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--tecno-dark);
            overflow-x: hidden;
        }

        /* --- Badge de Usuario (Esquina Superior Derecha) --- */
        .user-badge {
            position: fixed; top: 20px; right: 20px;
            background: var(--white);
            padding: 10px 20px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; /* Oculto hasta que inicie sesión */
            align-items: center; gap: 10px;
            cursor: pointer; z-index: 1000;
            border: 1px solid #e2e8f0;
            transition: var(--transition);
        }
        .user-badge:hover { transform: scale(1.05); }
        .dev-tag {
            background: #ef4444; color: white;
            font-size: 10px; padding: 2px 8px;
            border-radius: 10px; font-weight: bold;
        }

        /* --- Contenedor Principal --- */
        .main-card {
            width: 90%; max-width: 800px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px; padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-container {
            width: 100px; height: 100px; margin: 0 auto 15px;
            background: var(--white); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .logo-img { width: 70px; height: auto; }

        h1 { 
            font-size: 28px; font-weight: 800; margin-bottom: 35px;
            background: var(--tecno-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- Grid de Botones --- */
        .menu-grid {
            display: grid; gap: 20px;
            grid-template-columns: repeat(2, 1fr);
        }
        @media (min-width: 768px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }

        .btn-nav {
            background: var(--white); border: 1px solid #e2e8f0;
            border-radius: 24px; padding: 20px;
            text-decoration: none; color: var(--tecno-dark);
            display: flex; flex-direction: column; align-items: center;
            transition: var(--transition); font-weight: 600;
        }
        .btn-nav:hover {
            transform: translateY(-5px); border-color: var(--tecno-blue);
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.1);
        }
        .btn-nav img { width: 40px; height: 40px; margin-bottom: 12px; }
        .btn-nav i { font-size: 35px; margin-bottom: 12px; font-style: normal; }

        .accent { border: 1px solid var(--tecno-blue); background: #f0f7ff; }
        .on-work { border: 2px dashed #cbd5e1; color: #94a3b8; cursor: default; }

        /* --- Modales --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            display: none; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: var(--white); padding: 30px; border-radius: 28px;
            width: 320px; text-align: center;
        }

        /* Se agregó 'select' a los estilos para que la lista desplegable coincida con los inputs */
        input, select {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #e2e8f0;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn-primary {
            width: 100%; padding: 12px; background: var(--tecno-gradient);
            color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        footer { margin-top: 30px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="userBadge" class="user-badge" onclick="document.getElementById('userMenuModal').style.display='flex'">
        <span id="userNameDisplay">Usuario</span>
        <span id="userDevTag" class="dev-tag">DEV</span>
    </div>

    <!-- Modal de Login -->
    <div id="loginModal" class="modal-overlay" style="display: flex;">
        <div class="modal-content">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="userIn" placeholder="Usuario">
            <input type="password" id="passIn" placeholder="Contraseña">
            <button class="btn-primary" onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="userMenuModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Mi Cuenta</h2>
            <button class="btn-primary" onclick="abrirCambioClave()" style="background: var(--tecno-blue);">Cambiar Contraseña</button>
            <button class="btn-primary" onclick="cerrarSesion()" style="background: #ef4444;">Cerrar Sesión</button>
            <button class="btn-primary" onclick="document.getElementById('userMenuModal').style.display='none'" style="background: #cbd5e1; color: black;">Volver</button>
        </div>
    </div>

    <div id="changePassModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Nueva Contraseña</h2>
            <input type="password" id="currentPass" placeholder="Contraseña Actual">
            <input type="password" id="newPass" placeholder="Nueva Contraseña">
            <button class="btn-primary" onclick="cambiarPassword()">Guardar Cambios</button>
            <button class="btn-primary" onclick="document.getElementById('changePassModal').style.display='none'" style="background: #cbd5e1; color: black;">Cancelar</button>
        </div>
    </div>

    <!-- Modal para Crear Usuario (Actualizado con Select) -->
    <div id="createUserModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Registrar Usuario</h2>
            <input type="text" id="newUsername" placeholder="Nombre">
            <input type="text" id="newPassword" placeholder="Clave Temporal">
            <input type="text" id="newState" placeholder="Estado (Lara, etc.)">
            
            <select id="newUserRole">
                <option value="promotor">Promotor</option>
                <option value="retailer">Retailer</option>
                <option value="supervisor">Supervisor</option>
                <option value="admin">Admin</option>
                <option value="dev">Dev</option>
            </select>

            <button class="btn-primary" onclick="crearUsuario()">Crear</button>
            <button class="btn-primary" onclick="document.getElementById('createUserModal').style.display='none'" style="background: #cbd5e1; color: black;">Cerrar</button>
        </div>
    </div>

    <div class="main-card">
        <div class="logo-container"><img src="TECNO-TOOL-icon.png" class="logo-img"></div>
        <h1>TECNO Tool</h1>
        <div class="menu-grid" id="gridContainer"></div>
        <footer>TECNO Mobile Venezuela &copy; | GuilleDev 2026</footer>
    </div>

    <script>
        const API_URL = 'https://GuillermoDev.pythonanywhere.com';
        
        // --- ARREGLO ADAPTATIVO POR ROLES ---
        const configBotones = [
            { nombre: "Reporte entrada",            link: "reporte-entrada.html",             icono: "entrada.png",   emoji: "📍", visibleToRol: ["retailer", "admin", "dev"] },
            { nombre: "Reporte salida",             link: "reporte.html",                     icono: "reporte.png",   emoji: "📝", visibleToRol: ["retailer", "admin", "dev"] },
            { nombre: "Registro de equipos",        link: "equiposDisponibles.html",          icono: "phone.png",     emoji: "📱", visibleToRol: ["promotor", "retailer", "supervisor", "admin", "dev"] },
            { nombre: "Gestion de material POP",    link: "gestionPOP.html",                  icono: "box.png",       emoji: "🎁", visibleToRol: ["promotor", "retailer", "supervisor", "admin", "dev"] },
            { nombre: "Gestion de binance ID",      link: "generadorDeListado-binance.html",  icono: "binance.png",   emoji: "🔶", visibleToRol: ["retailer", "supervisor", "admin", "dev"] },
            { nombre: "IMEI QR GENERATOR",          link: "https://docs.google.com/spreadsheets/d/1rWnxzCo7ttoErCXVy1yk6HIyHTtlDMWFr25gm71aqa0/edit?gid=646746000#gid=646746000", icono: "place.png", emoji: "📱", visibleToRol: ["retailer", "supervisor", "admin", "dev"] },
            { nombre: "IMEI Tools",                 link: "herramientas.html",                icono: "place.png",     emoji: "📱🔶", visibleToRol: ["promotor", "retailer", "supervisor", "admin", "dev"] },
            // Ejemplo: Este botón solo lo verán estos tres roles:
            { nombre: "Reporte salida SUPERVISOR",  link: "reporte-SUPERVISOR.html",          icono: "place.png",     emoji: "📱📝", visibleToRol: ["supervisor", "admin", "dev"] }
        ];

        async function verificarSesion() {
            // 1. CARGA INMEDIATA (Optimización de velocidad)
            const cachedUser = localStorage.getItem('tecno_current_user');
            const cachedRole = localStorage.getItem('tecno_current_role');
            
            if(cachedUser && cachedRole) {
                mostrarInterfaz(cachedUser, cachedRole);
            }

            // 2. VERIFICACIÓN SILENCIOSA CON EL SERVIDOR
            try {
                const resp = await fetch(`${API_URL}/check_auth`, {credentials: 'include'});
                const data = await resp.json();
                
                if(data.authenticated) {
                    mostrarInterfaz(data.user, data.role); // Actualiza si hubo algún cambio
                } else {
                    mostrarLogin(); // Si expiró la sesión, lo manda al login
                }
            } catch(e) { 
                console.log("Error de conexión, manteniendo caché si existe.");
                if(!cachedUser) mostrarLogin();
            }
        }
        
        function mostrarInterfaz(username, role) {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('userBadge').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = username;
            document.getElementById('userDevTag').style.display = (role === 'dev') ? 'block' : 'none';
            
            localStorage.setItem('tecno_current_user', username);
            localStorage.setItem('tecno_current_role', role); // Se guarda el rol para la carga rápida
            
            cargarMenu(role);
        }

        function mostrarLogin() {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('userBadge').style.display = 'none';
            document.getElementById('gridContainer').innerHTML = '';
            localStorage.removeItem('tecno_current_user');
            localStorage.removeItem('tecno_current_role');
        }

        function cargarMenu(role) {
            const container = document.getElementById('gridContainer');
            container.innerHTML = "";

            configBotones.forEach(btn => {
                // LÓGICA ADAPTATIVA: Si el rol del usuario no está en el array, no dibuja el botón
                if (btn.visibleToRol && !btn.visibleToRol.includes(role)) return;

                const item = document.createElement('a');
                item.href = btn.link;
                item.className = 'btn-nav';
                item.innerHTML = `<img src="${btn.icono}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"><i style="display:none">${btn.emoji}</i><span>${btn.nombre}</span>`;
                container.appendChild(item);
            });

            // Lógica Exclusiva para el DEV
            if(role === 'dev') {
                const devBtn = document.createElement('div');
                devBtn.className = 'btn-nav accent';
                devBtn.style.cursor = 'pointer';
                devBtn.innerHTML = `<i>⚙️</i><span>Crear Usuario TecnoToolSystem</span>`;
                devBtn.onclick = () => document.getElementById('createUserModal').style.display = 'flex';
                container.appendChild(devBtn);
            }

            const work = document.createElement('div');
            work.className = 'btn-nav on-work';
            work.innerHTML = `<i>🛠️</i><span>On work...</span>`;
            container.appendChild(work);
        }

        async function login() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            const resp = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({username: u, password: p}),
                credentials: 'include'
            });
            const data = await resp.json();
            if(data.success) { 
                mostrarInterfaz(u, data.role); 
            } else { 
                alert(data.message); 
            }
        }

        async function cerrarSesion() {
            await fetch(`${API_URL}/logout`, {method: 'POST', credentials: 'include'});
            localStorage.clear();
            location.reload();
        }

        function abrirCambioClave() {
            document.getElementById('userMenuModal').style.display = 'none';
            document.getElementById('changePassModal').style.display = 'flex';
        }

        async function cambiarPassword() {
            const cp = document.getElementById('currentPass').value;
            const np = document.getElementById('newPass').value;
            const resp = await fetch(`${API_URL}/change_password`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({current_password: cp, new_password: np}),
                credentials: 'include'
            });
            const data = await resp.json();
            alert(data.message);
            if(data.success) document.getElementById('changePassModal').style.display = 'none';
        }

        async function crearUsuario() {
            const u = document.getElementById('newUsername').value;
            const p = document.getElementById('newPassword').value;
            const e = document.getElementById('newState').value;
            const r = document.getElementById('newUserRole').value; // Ahora tomamos el valor del Select
            
            const resp = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                // Ahora se envía el atributo "role" en lugar de "is_admin"
                body: JSON.stringify({username: u, password: p, estado: e, role: r}), 
                credentials: 'include'
            });
            const data = await resp.json();
            alert(data.message);
            if(data.success) document.getElementById('createUserModal').style.display = 'none';
        }

        window.onload = verificarSesion;
    </script>
</body>
</html>
