<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | TECNO TOOL</title>
    <link rel="icon" type="image/png" href="https://guillermorodfer04dev.github.io/REPORT/TECNO-TOOL-icon.png">
    <style>
        :root {
            --tecno-blue: #0056b3;
            --tecno-gradient: linear-gradient(135deg, #0056b3 0%, #002d5f 100%);
            --tecno-dark: #0f172a;
            --bg-body: #edf2f7;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 86, 179, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 86, 179, 0.05) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--tecno-dark);
        }

        /* ----- NUEVO: Estilos de la etiqueta del usuario ----- */
        .user-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--tecno-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 1000;
            display: none; /* Se oculta hasta que haya nombre */
            animation: fadeInUp 0.5s ease-out;
        }

        .user-badge i {
            margin-right: 5px;
        }

        /* ----- NUEVO: Estilos del Modal de Registro ----- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            display: none; /* Se oculta por defecto */
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.4s ease-out;
        }

        .modal-content h2 {
            margin: 0 0 10px 0;
            font-size: 22px;
            color: var(--tecno-dark);
        }

        .modal-content p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
            transition: var(--transition);
            margin-bottom: 15px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: var(--tecno-blue);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .modal-content button {
            width: 100%;
            justify-content: center;
            cursor: pointer;
        }
        /* --------------------------------------------------- */

        .container {
            text-align: center;
            width: 90%;
            max-width: 420px;
            padding: 50px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .logo-container {
            background: var(--white);
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.1);
        }

        .logo {
            width: 70px;
            height: auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: var(--tecno-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 35px;
            font-size: 15px;
            line-height: 1.5;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background-color: var(--white);
            color: var(--tecno-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            transition: var(--transition);
        }

        .btn-nav i {
            font-size: 20px;
            margin-right: 12px;
        }

        .btn-nav span {
            flex-grow: 1;
            text-align: left;
        }

        .btn-nav:hover {
            border-color: var(--tecno-blue);
            transform: translateX(5px);
            box-shadow: 4px 10px 15px rgba(0, 86, 179, 0.05);
            background-color: #f8fafc;
        }

        .btn-nav.accent {
            background: var(--tecno-gradient);
            color: var(--white);
            border: none;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.2);
        }

        .btn-nav.accent:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 86, 179, 0.3);
            filter: brightness(1.1);
        }

        .arrow {
            font-size: 12px;
            opacity: 0.5;
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    
    <div id="userBadge" class="user-badge">
        <i>👤</i> Hola, <span id="displayUserName"></span>
    </div>

    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-content">
            <h2>¡Bienvenido!</h2>
            <p>Para personalizar tu experiencia, por favor ingresa tu nombre.</p>
            <input type="text" id="nameInput" placeholder="Ej. Carlos Pérez" autocomplete="off">
            <button id="saveNameBtn" class="btn-nav accent">Guardar y Continuar</button>
        </div>
    </div>

    <div class="container">
        <div class="logo-container">
            <img src="https://guillermorodfer04dev.github.io/REPORT/TECNO-TOOL-icon.png" alt="TECNO Logo" class="logo">
        </div>
        
        <h1>TECNO Tool</h1>
        <p class="subtitle">Herramientas de gestión<br><strong>Elige una opción:</strong></p>

        <div class="menu-grid">
            <a href="reporte-entrada.html" class="btn-nav accent">
                <i>📍</i>
                <span>Reporte de Entrada</span>
                <b class="arrow">▶</b>
            </a>

            <a href="reporte.html" class="btn-nav">
                <i>📝</i>
                <span>Reporte Diario</span>
                <b class="arrow">▶</b>
            </a>
            
            <a href="https://docs.google.com/spreadsheets/d/1rWnxzCo7ttoErCXVy1yk6HIyHTtlDMWFr25gm71aqa0/edit?gid=646746000#gid=646746000" class="btn-nav">
                <i>🔲</i>
                <span>Imei QR Generator</span>
                <b class="arrow">▶</b>
            </a>
        </div>
    </div>

    <footer>
        TECNO Mobile Venezuela &copy; 2026 | Guillermo Rod. Dev
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById("welcomeModal");
            const nameInput = document.getElementById("nameInput");
            const saveBtn = document.getElementById("saveNameBtn");
            const userBadge = document.getElementById("userBadge");
            const displayUserName = document.getElementById("displayUserName");

            // Función para generar un ID único simulado
            const generateDeviceID = () => {
                return 'DEV-' + Math.random().toString(36).substring(2, 10).toUpperCase() + '-' + Date.now();
            };

            // Comprobamos si ya existe la información en el navegador (localStorage)
            const savedName = localStorage.getItem("tecno_user_name");
            const savedID = localStorage.getItem("tecno_device_id");

            if (savedName && savedID) {
                // Si el usuario ya existe, mostramos su nombre y ocultamos el modal
                showUserBadge(savedName);
                console.log("Usuario detectado automáticamente. ID:", savedID);
            } else {
                // Si es primera vez, mostramos el modal para pedir el nombre
                modal.style.display = "flex";
            }

            // Lógica al hacer clic en "Guardar y Continuar"
            saveBtn.addEventListener("click", () => {
                const userName = nameInput.value.trim();

                if (userName !== "") {
                    const newDeviceID = generateDeviceID();

                    // Guardamos los datos en el almacenamiento local del dispositivo
                    localStorage.setItem("tecno_user_name", userName);
                    localStorage.setItem("tecno_device_id", newDeviceID);

                    // Cerramos el modal y mostramos la etiqueta
                    modal.style.display = "none";
                    showUserBadge(userName);
                    
                    console.log("Nuevo usuario registrado. ID Asignada:", newDeviceID);
                } else {
                    // Pequeña animación de error si se deja en blanco
                    nameInput.style.borderColor = "red";
                    setTimeout(() => nameInput.style.borderColor = "#e2e8f0", 1500);
                    nameInput.focus();
                }
            });

            // Permitir guardar al presionar "Enter"
            nameInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    saveBtn.click();
                }
            });

            // Función para actualizar y mostrar el nombre arriba a la derecha
            function showUserBadge(name) {
                displayUserName.textContent = name;
                userBadge.style.display = "block";
            }
        });
    </script>
</body>
</html>
