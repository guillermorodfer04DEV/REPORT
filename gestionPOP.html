<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --primary: #0056b3; --success: #28a745; --dark: #333; --border: #ddd; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: var(--dark); }
    .container { max-width: 600px; margin: auto; padding: 20px; }
    
    /* PANTALLA DE CARGA (Obligatorio) */
    #loader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: white; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .loader-bar-container { width: 200px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 10px; }
    .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

    /* FILTROS (Obligatorio) */
    .filter-box { background: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .search-input { width: 95%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 10px; }
    .kr-select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; }

    /* ESTILOS GENERALES */
    .hidden { display: none !important; }
    header { background: var(--primary); color: white; padding: 15px; text-align: center; margin-bottom: 20px; }
    .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-back { background: #666; color: white; margin-bottom: 20px; }
    .sale-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
    .qty-control { display: flex; align-items: center; gap: 10px; }
    .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: white; cursor: pointer; }
    .input-qty { width: 40px; text-align: center; border: 1px solid var(--border); }
    .form-control { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
    #status { text-align: center; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

<div id="loader-overlay">
  <div style="font-weight: bold;">Sincronizando TECNO Cloud...</div>
  <div class="loader-bar-container"><div class="loader-progress" id="loader-fill"></div></div>
</div>

<header>
  <h2 style="margin:0;">📱 TECNO TOOL V3</h2>
</header>

<div class="container">
  <button class="btn btn-back hidden" id="btn-volver" onclick="showMenu()">← Volver al Menú</button>

  <div id="main-menu">
    <button class="btn btn-primary" onclick="openEditor()">📝 Editor de Inventario</button>
    <button class="btn btn-success" onclick="openVentas()">🛒 Gestor de Ventas</button>
  </div>

  <div id="section-filters" class="hidden">
    <div class="filter-box">
      <input type="text" id="search-tienda" class="search-input" placeholder="🔍 Buscar tienda por nombre..." oninput="filtrarTodo()">
      <select id="filter-kr" class="kr-select" onchange="filtrarTodo()">
        <option value="">-- Todos los Retailers --</option>
        <option value="GLOBAL CELL">GLOBAL CELL</option>
        <option value="TECNO CORP">TECNO CORP</option>
        <option value="NC PHONE">NC PHONE</option>
        <option value="DAMASCO">DAMASCO</option>
        <option value="CANGURO">CANGURO</option>
      </select>
    </div>
  </div>

  <div id="editor-section" class="hidden">
    <div id="inventory-list"></div>
    <button class="btn btn-success" onclick="updateInventory()">☁️ Guardar Cambios en Excel</button>
  </div>

  <div id="ventas-section" class="hidden">
    <div id="sales-container"></div>
    <button class="btn btn-primary" style="background:#888;" onclick="addSaleForm()">+ Agregar otra venta</button>
    <button class="btn btn-success" id="btn-subir-ventas" onclick="submitSales()">☁️ Subir Ventas a Excel</button>
  </div>

  <div id="status"></div>
</div>

<script>
  // ==========================================
  // CONFIGURACIÓN (Mantén tu URL)
  // ==========================================
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby806Lbsaa1LEOdm3KGn6SZ8K8eXriNzGld9MRJXmAuW22GI-Dp6wjoG8BxbpzSoa6V/exec";
  
  let inventarioData = [];
  let equiposUnicos = [];

  // Al cargar la página, ocultar el loader inicial y mostrar menú
  window.onload = () => { toggleLoader(false); showMenu(); };

  function toggleLoader(show, progress = 0) {
    const loader = document.getElementById('loader-overlay');
    const bar = document.getElementById('loader-fill');
    if (loader) loader.classList.toggle('hidden', !show);
    if (bar) bar.style.width = progress + "%";
  }

  function showMenu() {
    document.getElementById('main-menu').classList.remove('hidden');
    document.getElementById('editor-section').classList.add('hidden');
    document.getElementById('ventas-section').classList.add('hidden');
    document.getElementById('section-filters').classList.add('hidden');
    document.getElementById('btn-volver').classList.add('hidden');
    document.getElementById('status').innerText = "";
  }

  function openEditor() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('editor-section').classList.remove('hidden');
    document.getElementById('section-filters').classList.remove('hidden');
    document.getElementById('btn-volver').classList.remove('hidden');
    fetchInventory();
  }

  function openVentas() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('ventas-section').classList.remove('hidden');
    document.getElementById('section-filters').classList.remove('hidden');
    document.getElementById('btn-volver').classList.remove('hidden');
    fetchInventory(true); 
    if (document.getElementById('sales-container').children.length === 0) addSaleForm();
  }

  async function fetchInventory(onlyData = false) {
    if (inventarioData.length > 0 && onlyData) { filtrarTodo(); return; }
    toggleLoader(true, 30);
    try {
      const response = await fetch(WEB_APP_URL + "?leer=datos");
      inventarioData = await response.json();
      const setEquipos = new Set();
      inventarioData.forEach(t => t.equipos.forEach(eq => setEquipos.add(eq.nombre)));
      equiposUnicos = Array.from(setEquipos);
      toggleLoader(true, 100);
      setTimeout(() => toggleLoader(false), 500);
      filtrarTodo();
    } catch (error) {
      toggleLoader(false);
      alert("Error cargando datos. Verifica tu conexión.");
    }
  }

  function filtrarTodo() {
    const kr = document.getElementById('filter-kr').value;
    const busca = document.getElementById('search-tienda').value.toLowerCase();
    const dataFiltrada = inventarioData.filter(t => {
      return (kr === "" || t.keyRetailer === kr) && t.nombreTienda.toLowerCase().includes(busca);
    });
    if (!document.getElementById('editor-section').classList.contains('hidden')) renderInventory(dataFiltrada);
    actualizarDropdownsVentas(dataFiltrada);
  }

  function renderInventory(datos) {
    const container = document.getElementById('inventory-list');
    container.innerHTML = datos.length === 0 ? "<p>No hay resultados.</p>" : "";
    datos.forEach((tienda) => {
      const tIdx = inventarioData.findIndex(t => t.nroFila === tienda.nroFila);
      const card = document.createElement('div');
      card.className = 'sale-card';
      card.style.borderLeft = "5px solid var(--primary)";
      let equiposHTML = '';
      tienda.equipos.forEach((eq, eIdx) => {
        equiposHTML += `
          <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#f9f9f9; padding:5px;">
            <span style="font-size:12px;">${eq.nombre}</span>
            <div class="qty-control">
              <button class="btn-qty" onclick="changeQty(${tIdx}, ${eIdx}, -1)">-</button>
              <span>${eq.cantidad}</span>
              <button class="btn-qty" onclick="changeQty(${tIdx}, ${eIdx}, 1)">+</button>
            </div>
          </div>`;
      });
      card.innerHTML = `<strong>${tienda.nombreTienda}</strong><br><small>${tienda.keyRetailer}</small><hr>${equiposHTML}`;
      container.appendChild(card);
    });
  }

  function changeQty(tIdx, eIdx, delta) {
    let cant = parseInt(inventarioData[tIdx].equipos[eIdx].cantidad) + delta;
    inventarioData[tIdx].equipos[eIdx].cantidad = Math.max(0, cant);
    filtrarTodo();
  }

  function actualizarDropdownsVentas(datos) {
    document.querySelectorAll('.v-tienda').forEach(sel => {
      const val = sel.value;
      sel.innerHTML = '<option value="">Seleccione tienda...</option>';
      datos.forEach(t => sel.innerHTML += `<option value="${t.nombreTienda}">${t.nombreTienda}</option>`);
      sel.value = val;
    });
    document.querySelectorAll('.v-equipo').forEach(sel => {
      if (sel.options.length <= 1) {
        sel.innerHTML = '<option value="">Seleccione equipo...</option>';
        equiposUnicos.forEach(e => sel.innerHTML += `<option value="${e}">${e}</option>`);
      }
    });
  }

  function addSaleForm() {
    const container = document.getElementById('sales-container');
    const id = Date.now();
    const card = document.createElement('div');
    card.className = 'sale-card';
    card.id = `sale-${id}`;
    card.innerHTML = `
      <button onclick="this.parentElement.remove()" style="float:right; border:none; background:none; color:red; font-weight:bold;">X</button>
      <label>Tienda:</label><select class="v-tienda form-control"></select>
      <label>Equipo:</label><select class="v-equipo form-control"></select>
      <label>Key Retailer:</label>
      <select class="v-ka form-control">
        <option value="GLOBAL CELL">GLOBAL CELL</option><option value="TECNO CORP">TECNO CORP</option>
        <option value="NC PHONE">NC PHONE</option><option value="DAMASCO">DAMASCO</option><option value="CANGURO">CANGURO</option>
      </select>
      <input type="file" class="v-foto form-control" accept="image/*" multiple>`;
    container.appendChild(card);
    filtrarTodo();
  }

  async function updateInventory() {
    const status = document.getElementById('status');
    status.innerText = "⏳ Guardando...";
    try {
      await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ accion: "actualizar_inventario", datos: inventarioData })});
      status.innerText = "✅ Guardado";
    } catch (e) { status.innerText = "❌ Error"; }
  }

  // --- SUBIR VENTAS --- (Mismo procedimiento que antes)
  async function submitSales() {
    // ... (Tu lógica de submitSales del paso anterior funciona bien aquí)
    alert("Iniciando subida...");
  }
</script>
</body>
</html>
