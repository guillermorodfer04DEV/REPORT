<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { 
      --bg: #1e293b; --card: #334155; --text: #f8fafc; 
      --primary: #3b82f6; --success: #22c55e; --accent: #64748b;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; background-color: var(--bg); color: var(--text); }
    .container { max-width: 500px; margin: auto; }
    
    /* Diseño compacto y tarjetas */
    .sale-card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #475569; }
    .filter-box { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 12px; }
    
    /* Inputs y Botones */
    .form-control, .search-input, .kr-select { width: 100%; padding: 8px; border: 1px solid #475569; border-radius: 4px; background: #1e293b; color: white; box-sizing: border-box; margin-bottom: 5px; }
    .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 8px; color: white; }
    .btn-primary { background: var(--primary); }
    .btn-success { background: var(--success); }
    .btn-back { background: var(--accent); }
    
    /* Control de cantidad compacto */
    .btn-qty { width: 28px; height: 28px; border-radius: 4px; border: none; background: #475569; color: white; cursor: pointer; }
    .qty-control { display: flex; align-items: center; gap: 8px; }

    #loader-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loader-overlay">
  <div style="font-weight: bold;">Sincronizando TECNO Cloud...</div>
</div>

<header style="text-align:center; padding:10px;">
  <h2 style="margin:0; font-size: 1.2rem;">📱 TECNO TOOL V3</h2>
</header>

<div class="container">
  <button class="btn btn-back hidden" id="btn-volver" onclick="showMenu()">← Volver al Menú</button>

  <div id="main-menu">
    <button class="btn btn-primary" onclick="openEditor()">📝 Editor de Inventario</button>
    <button class="btn btn-success" onclick="openVentas()">🛒 Gestor de Ventas</button>
  </div>

  <div id="section-filters" class="hidden">
    <div class="filter-box">
      <input type="text" id="search-tienda" class="search-input" placeholder="🔍 Buscar tienda..." oninput="filtrarTodo()">
      <select id="filter-kr" class="kr-select" onchange="filtrarTodo()">
        <option value="">-- Todos los Retailers --</option>
        <option value="GLOBAL CELL">GLOBAL CELL</option>
        <option value="TECNO CORP">TECNO CORP</option>
        <option value="NC PHONE">NC PHONE</option>
        <option value="DAMASCO">DAMASCO</option>
        <option value="CANGURO">CANGURO</option>
      </select>
    </div>
  </div>

  <div id="editor-section" class="hidden">
    <div id="inventory-list"></div>
    <button class="btn btn-success" onclick="updateInventory()">☁️ Guardar Cambios</button>
  </div>

  <div id="ventas-section" class="hidden">
    <div id="sales-container"></div>
    <button class="btn" style="background:#64748b;" onclick="addSaleForm()">+ Agregar otra venta</button>
    <button class="btn btn-success" id="btn-subir-ventas" onclick="submitSales()">☁️ Subir Ventas</button>
  </div>

  <div id="status" style="text-align:center; margin-top:10px;"></div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby806Lbsaa1LEOdm3KGn6SZ8K8eXriNzGld9MRJXmAuW22GI-Dp6wjoG8BxbpzSoa6V/exec";
  let inventarioData = [];
  let equiposUnicos = [];

  window.onload = () => { toggleLoader(false); showMenu(); };

  function toggleLoader(show) { document.getElementById('loader-overlay').classList.toggle('hidden', !show); }

  function showMenu() {
    document.getElementById('main-menu').classList.remove('hidden');
    document.getElementById('editor-section').classList.add('hidden');
    document.getElementById('ventas-section').classList.add('hidden');
    document.getElementById('section-filters').classList.add('hidden');
    document.getElementById('btn-volver').classList.add('hidden');
  }

  function openEditor() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('editor-section').classList.remove('hidden');
    document.getElementById('section-filters').classList.remove('hidden');
    document.getElementById('btn-volver').classList.remove('hidden');
    fetchInventory();
  }

  function openVentas() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('ventas-section').classList.remove('hidden');
    document.getElementById('section-filters').classList.remove('hidden');
    document.getElementById('btn-volver').classList.remove('hidden');
    fetchInventory(true);
    if (document.getElementById('sales-container').children.length === 0) addSaleForm();
  }

  async function fetchInventory(onlyData = false) {
    if (inventarioData.length > 0 && onlyData) { filtrarTodo(); return; }
    toggleLoader(true);
    try {
      const response = await fetch(WEB_APP_URL + "?leer=datos");
      inventarioData = await response.json();
      const setEquipos = new Set();
      inventarioData.forEach(t => t.equipos.forEach(eq => setEquipos.add(eq.nombre)));
      equiposUnicos = Array.from(setEquipos);
      toggleLoader(false);
      filtrarTodo();
    } catch (e) { toggleLoader(false); alert("Error de conexión"); }
  }

  function filtrarTodo() {
    const kr = document.getElementById('filter-kr').value;
    const busca = document.getElementById('search-tienda').value.toLowerCase();
    const dataFiltrada = inventarioData.filter(t => (kr === "" || t.keyRetailer === kr) && t.nombreTienda.toLowerCase().includes(busca));
    if (!document.getElementById('editor-section').classList.contains('hidden')) renderInventory(dataFiltrada);
    actualizarDropdownsVentas(dataFiltrada);
  }

  function renderInventory(datos) {
    const container = document.getElementById('inventory-list');
    container.innerHTML = "";
    datos.forEach((tienda) => {
      const tIdx = inventarioData.findIndex(t => t.nroFila === tienda.nroFila);
      const card = document.createElement('div');
      card.className = 'sale-card';
      // Campo editable de nombre de tienda
      card.innerHTML = `
        <input type="text" class="form-control" value="${tienda.nombreTienda}" onchange="inventarioData[${tIdx}].nombreTienda = this.value">
        <small style="color:var(--accent)">${tienda.keyRetailer}</small>
        ${tienda.equipos.map((eq, eIdx) => `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
            <span style="font-size:12px;">${eq.nombre}</span>
            <div class="qty-control">
              <button class="btn-qty" onclick="changeQty(${tIdx}, ${eIdx}, -1)">-</button>
              <span style="min-width:20px; text-align:center;">${eq.cantidad}</span>
              <button class="btn-qty" onclick="changeQty(${tIdx}, ${eIdx}, 1)">+</button>
            </div>
          </div>`).join('')}`;
      container.appendChild(card);
    });
  }

  function changeQty(tIdx, eIdx, delta) {
    inventarioData[tIdx].equipos[eIdx].cantidad = Math.max(0, parseInt(inventarioData[tIdx].equipos[eIdx].cantidad) + delta);
    filtrarTodo();
  }

  function actualizarDropdownsVentas(datos) {
    document.querySelectorAll('.v-tienda').forEach(sel => {
      const val = sel.value;
      sel.innerHTML = '<option value="">Seleccione tienda...</option>' + datos.map(t => `<option value="${t.nombreTienda}">${t.nombreTienda}</option>`).join('');
      sel.value = val;
    });
  }

  function addSaleForm() {
    const container = document.getElementById('sales-container');
    const card = document.createElement('div');
    card.className = 'sale-card';
    card.innerHTML = `
      <button onclick="this.parentElement.remove()" style="float:right; border:none; background:none; color:#f87171;">X</button>
      <label style="font-size:10px;">Tienda:</label><select class="v-tienda form-control"></select>
      <label style="font-size:10px;">Equipo:</label><select class="v-equipo form-control">${equiposUnicos.map(e => `<option>${e}</option>`).join('')}</select>
      <input type="file" class="v-foto form-control" accept="image/*" multiple>`;
    container.appendChild(card);
    filtrarTodo();
  }

  async function updateInventory() {
    document.getElementById('status').innerText = "⏳ Guardando...";
    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ accion: "actualizar_inventario", datos: inventarioData })});
    document.getElementById('status').innerText = "✅ Guardado";
  }

  async function submitSales() {
    alert("Iniciando subida...");
  }
</script>
</body>
</html>
