<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="https://guillermorodfer04dev.github.io/REPORT/TECNO-TOOL-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de entrada | TECNO TOOL</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-label: #555555;
            --border-input: #cccccc;
            --whatsapp-green: #25D366;
            --whatsapp-hover: #128C7E;
            --danger-red: #dc3545;
            --danger-hover: #c82333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0;
            padding: 15px; 
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px; 
            background: var(--bg-card); 
            padding: 25px 20px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .btn-volver {
            text-decoration: none;
            background-color: #e2e6ea;
            color: #333;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .btn-volver:hover {
            background-color: #d3d9df;
        }

        h2 { 
            text-align: center; 
            color: var(--primary-blue); 
            margin: 0 0 20px 0;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 14px;
            color: var(--text-label);
        }

        input, select { 
            width: 100%; 
            padding: 12px 10px; 
            box-sizing: border-box; 
            border: 1px solid var(--border-input); 
            border-radius: 8px; 
            font-size: 15px;
            background-color: #fafafa;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-blue);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        input[readonly] {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
            border-color: #dee2e6;
        }

        /* Nuevas clases para los botones de agregar/quitar minorista */
        .input-with-button {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-with-button select {
            flex-grow: 1;
        }

        .btn-icon {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px; /* Aproximadamente el alto del select */
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
            flex-shrink: 0;
        }

        .btn-icon:hover { background-color: #004085; }
        
        .btn-icon.remove { background-color: var(--danger-red); }
        .btn-icon.remove:hover { background-color: var(--danger-hover); }

        .btn-copiar { 
            margin-top: 25px; 
            padding: 14px 20px; 
            background-color: var(--whatsapp-green); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            font-weight: bold; 
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(37, 211, 102, 0.25);
        }

        .btn-copiar:hover { 
            background-color: var(--whatsapp-hover); 
        }

        .btn-copiar:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            h2 { font-size: 20px; }
            input, select { padding: 10px; font-size: 14px; }
            .btn-icon { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <a href="index.html" class="btn-volver">⬅ Volver al inicio</a>
        </div>

        <h2>Reporte de entrada:</h2>

        <div class="form-group">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha">
        </div>

        <div class="form-group">
            <label for="nombre">Nombre del Especialista:</label>
            <select id="nombre">
                <option value="" disabled selected>Seleccione...</option>
                <option value="José Reina">José Reina</option>
                <option value="Guillermo Rodríguez">Guillermo Rodríguez</option>
                <option value="Alexandra Guaimare">Alexandra Guaimare</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cargo">Cargo:</label>
            <input type="text" id="cargo" value="Especialista" readonly>
        </div>

        <div class="form-group">
            <label for="region">Centro Comercial/Ruta:</label>
            <input type="text" id="region" value="C.C. ">
        </div>

        <div class="form-group" id="grupo-minorista-1">
            <label for="minorista">Minorista Objetivo (Retailer):</label>
            <div class="input-with-button">
                <select id="minorista">
                    <option value="" disabled selected>Seleccione Retailer</option>
                    <option value="GLOBAL CELL">GLOBAL CELL</option>
                    <option value="TECNO CORP">TECNO CORP</option>
                    <option value="NC PHONE">NC PHONE</option>
                    <option value="DAMASCO">DAMASCO</option>
                    <option value="CANGURO">CANGURO</option>
                </select>
                <button type="button" class="btn-icon" id="btn-add-minorista" onclick="mostrarSegundoMinorista()" title="Agregar otro minorista">+</button>
            </div>
        </div>

        <div class="form-group" id="grupo-minorista-2" style="display: none;">
            <label for="minorista2">Segundo Minorista Objetivo:</label>
            <div class="input-with-button">
                <select id="minorista2">
                    <option value="" disabled selected>Seleccione 2do Retailer</option>
                    <option value="GLOBAL CELL">GLOBAL CELL</option>
                    <option value="TECNO CORP">TECNO CORP</option>
                    <option value="NC PHONE">NC PHONE</option>
                    <option value="DAMASCO">DAMASCO</option>
                    <option value="CANGURO">CANGURO</option>
                </select>
                <button type="button" class="btn-icon remove" onclick="ocultarSegundoMinorista()" title="Quitar este minorista">-</button>
            </div>
        </div>

        <div class="form-group">
            <label for="cantidad">Cant. Tiendas Objetivo:</label>
            <input type="number" id="cantidad" placeholder="Ej. 5" min="0">
        </div>

        <button onclick="copiarTexto()" id="btnCopiar" class="btn-copiar">Copiar para WhatsApp</button>
    </div>

    <script>
        // Autocompletar la fecha con el día actual
        document.getElementById('fecha').valueAsDate = new Date();

        // Funciones para manejar el segundo minorista
        function mostrarSegundoMinorista() {
            document.getElementById('grupo-minorista-2').style.display = 'block';
            document.getElementById('btn-add-minorista').style.display = 'none';
        }

        function ocultarSegundoMinorista() {
            document.getElementById('grupo-minorista-2').style.display = 'none';
            document.getElementById('btn-add-minorista').style.display = 'flex';
            document.getElementById('minorista2').value = ""; // Reiniciar el valor al ocultar
        }

        // Función para armar y copiar el texto
        function copiarTexto() {
            const fechaInput = document.getElementById('fecha').value;
            let fechaFormateada = "";
            if(fechaInput) {
                const [year, month, day] = fechaInput.split('-');
                fechaFormateada = `${day}/${month}/${year}`;
            }

            const nombre = document.getElementById('nombre').value;
            const cargo = document.getElementById('cargo').value;
            const region = document.getElementById('region').value;
            const minorista1 = document.getElementById('minorista').value;
            const minorista2 = document.getElementById('minorista2').value;
            const cantidad = document.getElementById('cantidad').value;

            // Validar que se seleccionó nombre y el primer minorista
            if (!nombre || !minorista1) {
                alert("Por favor, selecciona tu nombre y al menos el primer minorista objetivo antes de copiar.");
                return;
            }

            // Unir minoristas si el segundo está visible y seleccionado
            let textoMinoristas = minorista1;
            if (document.getElementById('grupo-minorista-2').style.display !== 'none' && minorista2) {
                textoMinoristas += ` y ${minorista2}`;
            }

            const texto = `*REPORTE DIARIO DE ACTIVIDADES*

* *Fecha:* ${fechaFormateada}

* *Nombre:* ${nombre}

* *Cargo:* ${cargo}

* *Región/Ruta:* Barquisimeto | ${region}

* *Nombre del principal minorista objetivo:* ${textoMinoristas}

* *Cantidad total de tiendas minoristas clave objetivo:* ${cantidad}`;

            // Copiar al portapapeles
            navigator.clipboard.writeText(texto).then(() => {
                const btn = document.getElementById('btnCopiar');
                btn.innerText = '¡Copiado con éxitoooo!';
                btn.style.backgroundColor = '#128C7E';
                
                setTimeout(() => {
                    btn.innerText = 'Copiar para WhatsApp';
                    btn.style.backgroundColor = 'var(--whatsapp-green)';
                }, 3000);
            }).catch(err => {
                alert('No se pudo copiar el texto. Verifica los permisos del navegador.');
                console.error(err);
            });
        }
    </script>

</body>
</html>
