<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Profesional - TECNO</title>
  <style>
    :root {
      --primary: #0066ff;
      --bg: #f8f9fa;
      --border: #e0e0e0;
      --success: #28a745;
      --dark: #343a40;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
    .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 1000px; }
    
    /* Botón Volver */
    .btn-back { background: var(--dark); color: white; padding: 8px 16px; margin-bottom: 20px; border-radius: 6px; text-decoration: none; display: inline-flex; font-size: 0.9rem; border: none; cursor: pointer; transition: 0.2s; }
    .btn-back:hover { background: #23272b; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
    h2 { margin: 0; color: #333; font-size: 1.2rem; }

    /* Panel de pegado de texto */
    .paste-section { background: #eef4ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed var(--primary); display: none; }
    .paste-section textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; resize: vertical; margin-bottom: 10px; font-family: monospace; font-size: 0.85rem;}
    
    .btn-toggle-paste { background: #fff; color: var(--primary); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
    .btn-toggle-paste:hover { background: #f0f7ff; }

    /* Grilla de datos - Ajustada a 6 columnas */
    .row-header { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1.2fr 1.2fr 40px; gap: 8px; padding: 0 10px; margin-bottom: 8px; font-size: 0.85rem; color: #666; font-weight: bold; }
    .data-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1.2fr 1.2fr 40px; gap: 8px; background: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 8px; margin-bottom: 8px; align-items: center; transition: 0.2s; }
    .data-row:hover { border-color: var(--primary); background: #f0f7ff; }

    input[type="text"], select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 5px; font-size: 0.85rem; outline: none; background: var(--bg); transition: 0.3s; box-sizing: border-box; }
    input[type="text"]:focus, select:focus { background: white; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,102,255,0.1); }
    input[type="text"]:disabled { background: #e9ecef; color: #6c757d; font-weight: bold; text-align: center; }
    select { cursor: pointer; }

    /* Contenedor del ID y Checkbox */
    .id-container { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 5px; padding-right: 8px; border: 1px solid var(--border); }
    .id-container input[type="text"] { background: transparent; border: none; }
    .id-container input[type="text"]:focus { background: white; box-shadow: none;}
    .chk-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .chk-wrapper span { font-size: 0.6rem; color: #666; font-weight: bold; margin-bottom: 2px;}

    .btn { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
    .btn-action { background: var(--success); color: white; padding: 8px 15px; }
    .btn-action:hover { background: #218838; }

    .btn-add { background: #eef4ff; color: var(--primary); padding: 8px 16px; font-size: 0.9rem; border: 1px dashed var(--primary); width: 100%; margin-top: 5px; }
    .btn-add:hover { background: var(--primary); color: white; border-style: solid; }
    
    .btn-submit { background: var(--primary); color: white; padding: 12px; width: 100%; margin-top: 20px; font-size: 1rem; }
    .btn-submit:hover { background: #0052cc; transform: translateY(-1px); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .btn-del { background: none; color: #ff4d4d; font-size: 1.2rem; padding: 0; opacity: 0.6; }
    .btn-del:hover { opacity: 1; }

    #status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: 500; }
    
    @media (max-width: 768px) {
      .row-header { display: none; }
      .data-row { grid-template-columns: 1fr; gap: 5px; padding: 15px; position: relative;}
      .btn-del { position: absolute; top: 10px; right: 10px; }
    }
  </style>
</head>
<body>

<div class="container">
  <button class="btn-back" onclick="volverMenu()">← Volver al Menú Principal</button>

  <header>
    <h2>Carga de Datos (Binance ID)</h2>
    <div id="counter" style="color: #666; font-size: 0.8rem;">0 registro(s)</div>
  </header>

  <button class="btn-toggle-paste" onclick="togglePasteArea()">
    📋 Importar desde WhatsApp
  </button>

  <div class="paste-section" id="paste-section">
    <p style="margin-top:0; font-size:0.85rem; color:#555;">Pega aquí los mensajes directamente. Soporta múltiples formatos simultáneamente.</p>
    
    <div style="margin-bottom: 10px;">
      <label style="font-size: 0.85rem; font-weight: bold; color: #333;">Asignar Key Retailer a todas estas filas:</label>
      <select id="global-ka" style="width: 100%; margin-top: 5px; margin-bottom: 10px;">
        <option value="">-- Autodetectar según el nombre de la tienda --</option>
        <option value="GLOBAL CELL">GLOBAL CELL</option>
        <option value="TECNO CORP">TECNO CORP</option>
        <option value="NC PHONE">NC PHONE</option>
        <option value="DAMASCO">DAMASCO</option>
        <option value="CANGURO">CANGURO</option>
      </select>
    </div>

    <textarea id="whatsapp-text" placeholder="* Nombre - Tienda - ID&#10;o formato clásico: [11/4, 7:48 p.m.] Nombre: Amanda..."></textarea>
    <button class="btn btn-action" onclick="procesarTexto()">Filtrar y Cargar a la Tabla</button>
  </div>

  <div class="row-header">
    <div>Nombre *</div>
    <div>Binance ID *</div>
    <div>Contacto</div>
    <div>Tienda</div>
    <div>Key Retailer</div>
    <div></div>
  </div>

  <div id="form-container">
    </div>

  <button class="btn btn-add" onclick="addRow()">+ Añadir fila manualmente</button>
  
  <button class="btn btn-submit" id="submit-btn" onclick="sendData()">Subir Data al Excel</button>
  <a href="https://docs.google.com/spreadsheets/d/1jxtciGW1QgATZehf190-s-SuUDB3BxeL0tjooWx-kdI/edit?usp=sharing" target="_blank" class="btn-nube">☁️ Ir a la nube</a>
  <div id="status"></div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzRHng6wcw-ftV7aqEBXsO6lG5WMNmIG6bXfWW00FM7b0EOUaPuHWcXBHMkJht5hqc_9w/exec";
  let count = 0;

  window.onload = () => addRow();

  function volverMenu() {
    // Puedes cambiar '/' por el enlace real a tu menú principal (ej. 'menu.html')
    window.location.href = 'index.html'; 
  }

  function togglePasteArea() {
    const section = document.getElementById('paste-section');
    section.style.display = section.style.display === 'block' ? 'none' : 'block';
  }

  function togglePending(chk) {
    const input = chk.closest('.id-container').querySelector('.uid');
    if (chk.checked) {
      input.dataset.oldValue = input.value;
      input.value = "EN ESPERA";
      input.disabled = true;
    } else {
      input.disabled = false;
      input.value = input.dataset.oldValue || "";
    }
  }

  function addRow(nombre = "", id = "", contacto = "", tienda = "", pendiente = false, ka = "") {
    count++;
    const container = document.getElementById('form-container');
    const div = document.createElement('div');
    div.className = 'data-row';
    div.id = `row-${count}`;
    
    const chkChecked = pendiente ? "checked" : "";
    const idDisabled = pendiente ? "disabled" : "";
    const idValue = pendiente ? "EN ESPERA" : id;

    div.innerHTML = `
      <input type="text" class="nombre" placeholder="Nombre y Apellido" value="${nombre}" required>
      
      <div class="id-container">
        <input type="text" class="uid" placeholder="ID" value="${idValue}" ${idDisabled} required>
        <label class="chk-wrapper" title="Marcar como pendiente">
          <span>Espera</span>
          <input type="checkbox" class="chk-pendiente" onchange="togglePending(this)" ${chkChecked}>
        </label>
      </div>

      <input type="text" class="contacto" placeholder="0412..." value="${contacto}">
      <input type="text" class="tienda" placeholder="Sucursal" value="${tienda}">
      
      <select class="key-retailer">
        <option value="" ${ka === "" ? "selected" : ""}>-- Seleccionar --</option>
        <option value="GLOBAL CELL" ${ka === "GLOBAL CELL" ? "selected" : ""}>GLOBAL CELL</option>
        <option value="TECNO CORP" ${ka === "TECNO CORP" ? "selected" : ""}>TECNO CORP</option>
        <option value="NC PHONE" ${ka === "NC PHONE" ? "selected" : ""}>NC PHONE</option>
        <option value="DAMASCO" ${ka === "DAMASCO" ? "selected" : ""}>DAMASCO</option>
        <option value="CANGURO" ${ka === "CANGURO" ? "selected" : ""}>CANGURO</option>
      </select>

      <button class="btn btn-del" onclick="removeRow(${count})">×</button>
    `;
    container.appendChild(div);
    updateCounter();
  }

  function removeRow(id) {
    const row = document.getElementById(`row-${id}`);
    if (row) {
      row.remove();
      updateCounter();
    }
  }

  function updateCounter() {
    document.getElementById('counter').innerText = `${document.querySelectorAll('.data-row').length} registro(s)`;
  }

  // Función para autodetectar el Key Retailer según el nombre de la tienda
  function autoDetectKA(textoTienda) {
    const t = textoTienda.toUpperCase();
    if (t.includes("GLOBAL")) return "GLOBAL CELL";
    if (t.includes("TECNO")) return "TECNO CORP";
    if (t.includes("NC")) return "NC PHONE";
    if (t.includes("DAMASCO")) return "DAMASCO";
    if (t.includes("CANGURO")) return "CANGURO";
    return "";
  }

  // ALGORITMO DUAL DE EXTRACCIÓN
  // ALGORITMO DUAL DE EXTRACCIÓN (Actualizado con KA Global)
  function procesarTexto() {
    const text = document.getElementById('whatsapp-text').value;
    const globalKA = document.getElementById('global-ka').value; // Lee la selección global

    if (!text.trim()) return alert("Pega el texto primero.");

    const firstRow = document.querySelector('.data-row');
    if (firstRow) {
      const n = firstRow.querySelector('.nombre').value;
      const uid = firstRow.querySelector('.uid').value;
      if (!n && (!uid || uid === "EN ESPERA" || uid === "")) firstRow.remove();
    }

    const lines = text.split('\n');
    let remainingText = "";

    lines.forEach(line => {
      const bulletMatch = line.trim().match(/^\*\s+(.*)$/);
      if (bulletMatch) {
        const parts = bulletMatch[1].split(/\s+-\s+/);
        if (parts.length >= 3) {
          let rawId = parts.pop().trim();
          let n = parts.shift().trim();
          let t = parts.join(" - ").trim();
          let i = "", p = false, c = "";
          
          if (/pendiente/i.test(rawId)) {
            p = true;
          } else {
            const idMatch = rawId.match(/(\d+)/);
            if (idMatch) i = idMatch[1];
          }
          
          // Si el usuario seleccionó un KA global, lo usa. Si no, autodetecta.
          const ka = globalKA !== "" ? globalKA : autoDetectKA(t);
          addRow(n, i, c, t, p, ka);
          return; 
        }
      }
      remainingText += line + "\n";
    });

    if (remainingText.trim()) {
      const regexHeader = /\[\d{1,2}\/\d{1,2}.*?\] .*?:/g;
      const parts = remainingText.split(regexHeader).filter(p => p.trim() !== '');

      parts.forEach(part => {
        let pText = part.trim();
        let n = "", i = "", c = "", t = "", p = false;

        if (/pendiente/i.test(pText)) {
          p = true;
          pText = pText.replace(/pendiente/gi, '').trim();
        }

        pText = pText.replace(/Id:/gi, '').trim();

        const phoneMatch = pText.match(/(04(?:12|14|24|16|26)\d{7})/);
        if (phoneMatch) {
          c = phoneMatch[1];
          pText = pText.replace(phoneMatch[1], ' ').trim();
        }

        const idMatch = pText.match(/(\d{8,11})/);
        if (idMatch) {
          i = idMatch[1];
          pText = pText.replace(idMatch[1], ' ').trim();
        }

        let linesData = pText.split('\n').map(l => l.trim()).filter(l => l !== '');
        
        if (linesData.length === 1) {
          let words = linesData[0].split(' ').filter(w => w !== '');
          if (words.length > 2) {
            n = words.slice(0, 2).join(' ');
            t = words.slice(2).join(' ');
          } else {
            n = linesData[0];
          }
        } else if (linesData.length >= 2) {
          n = linesData[0];
          t = linesData.slice(1).join(' ');
        }

        n = n.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '').replace(/\s+/g, ' ').trim();
        t = t.replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s]/g, '').replace(/\s+/g, ' ').trim();

        if(n || i || c || t || p) {
          // Si el usuario seleccionó un KA global, lo usa. Si no, autodetecta.
          const ka = globalKA !== "" ? globalKA : autoDetectKA(t);
          addRow(n, i, c, t, p, ka);
        }
      });
    }

    document.getElementById('whatsapp-text').value = "";
    // Opcional: Reiniciar el desplegable global después de procesar
    document.getElementById('global-ka').value = "";
    togglePasteArea();
  }

  async function sendData() {
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('status');
    const rows = document.querySelectorAll('.data-row');
    const payload = [];

    if(rows.length === 0) return alert("No hay datos para enviar.");

    for (let row of rows) {
      const n = row.querySelector('.nombre').value.trim();
      const chk = row.querySelector('.chk-pendiente');
      const i = chk.checked ? "EN ESPERA" : row.querySelector('.uid').value.trim();
      
      if (!n || !i) return alert("El Nombre y el ID (o marcar Espera) son obligatorios en todas las filas.");
      
      payload.push({
        nombre: n,
        id: i,
        contacto: row.querySelector('.contacto').value.trim(),
        tienda: row.querySelector('.tienda').value.trim(),
        ka: row.querySelector('.key-retailer').value // Añadido al envío
      });
    }

    btn.disabled = true;
    status.innerText = "⏳ Enviando datos...";
    status.style.color = "#666";

    try {
      const response = await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });

      status.innerText = "✅ ¡Datos enviados con éxito!";
      status.style.color = "#28a745";
      
      setTimeout(() => {
        if(confirm("¿Deseas limpiar el formulario para una nueva carga?")) {
          document.getElementById('form-container').innerHTML = '';
          addRow();
          btn.disabled = false;
          status.innerText = "";
        } else {
          btn.disabled = false;
          status.innerText = "";
        }
      }, 1000);

    } catch (err) {
      status.innerText = "❌ Error de conexión.";
      status.style.color = "#dc3545";
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
