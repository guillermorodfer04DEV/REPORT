<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="https://guillermorodfer04dev.github.io/REPORT/TECNO-TOOL-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reporte Diario | TECNO TOOL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --tecno-blue: #0056b3;
            --tecno-green: #217346;
            --wsp-green: #25D366;
            --bg: #f4f7f9;
            --tecno-orange: #ff922b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 10px; color: #333; line-height: 1.5; }
        .container { background: white; max-width: 900px; margin: 0 auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        header { border-bottom: 3px solid var(--tecno-blue); margin-bottom: 25px; padding-bottom: 10px; text-align: center; }
        h1 { font-size: 1.5rem; color: var(--tecno-blue); margin: 0; text-transform: uppercase; }
        .section-title { background: #e9ecef; padding: 12px; font-weight: bold; margin-top: 25px; border-radius: 6px; border-left: 6px solid var(--tecno-blue); font-size: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #555; }
        input, textarea, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; background: #fff; width: 100%; }
        .btn-add { background: var(--tecno-blue); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-remove { background: #dc3545; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 12px; margin-top: 10px; width: 100%; cursor: pointer; }
        .store-block { border: 1px solid #e0e0e0; padding: 15px; margin-top: 10px; border-radius: 10px; background: #fdfdfd; }
        .image-preview-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .image-item { border: 1px solid #ddd; padding: 10px; border-radius: 10px; background: #fff; text-align: center; }
        .image-item img { width: 200px; height: 200px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 35px; }
        @media (min-width: 768px) { .btn-group { flex-direction: row; flex-wrap: wrap; } }
        .btn-final { flex: 1; min-width: 200px; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; text-decoration: none; }
        .hidden { display: none !important; }

        .btn-back-menu { position: fixed; top: 15px; left: 15px; z-index: 9999; text-decoration: none; background-color: #f0f4f8; color: #0056b3; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; border: 2px solid #0056b3; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<a href="index.html" class="btn-back-menu">Volver al inicio</a>

<div class="container">
    <header><h1>Reporte Diario TECNO</h1></header>

    <form id="reportForm">
        <div class="grid">
            <div class="form-group"><label>Fecha</label><input type="date" id="date"></div>
            <div class="form-group">
                <label>Nombre del Especialista</label>
                <select id="staffName">
                    <option value="">Seleccione...</option>
                    <option value="José Reina">José Reina</option>
                    <option value="Guillermo Rodríguez">Guillermo Rodríguez</option>
                    <option value="Alexandra Guaimare">Alexandra Guaimare</option>
                </select>
            </div>
            <div class="form-group"><label>Cargo</label><input type="text" id="role" value="Especialista"></div>
            <div class="form-group"><label>Centro comercial / Ruta</label><input type="text" id="region"></div>
        </div>

        <div class="grid" style="margin-top:10px;">
            <div class="form-group">
                <label>Minorista Objetivo 1 <button type="button" class="btn-add" style="padding: 2px 8px; margin-left: 10px;" onclick="toggleSecondRetailer()">+ Añadir Retailer</button></label>
                <select id="retailerName" onchange="updateRetailerTitles()">
                    <option value="">Seleccione Retailer...</option>
                    <option value="GLOBAL CELL">GLOBAL CELL</option>
                    <option value="TECNO CORP">TECNO CORP</option>
                    <option value="NC PHONE">NC PHONE</option>
                    <option value="DAMASCO">DAMASCO</option>
                    <option value="CANGURO">CANGURO</option>
                </select>
            </div>
            <div class="form-group"><label>Cant. Tiendas Objetivo 1</label><input type="number" id="shopsQty"></div>
        </div>

        <div id="row-retailer-2" class="hidden" style="margin-top:10px; border-left: 4px solid var(--tecno-orange); padding-left: 10px;">
            <div class="grid">
                <div class="form-group">
                    <label style="color: #e67e22;">Minorista Objetivo 2</label>
                    <select id="retailerName2" onchange="updateRetailerTitles()">
                        <option value="">Seleccione Retailer...</option>
                        <option value="GLOBAL CELL">GLOBAL CELL</option>
                        <option value="TECNO CORP">TECNO CORP</option>
                        <option value="NC PHONE">NC PHONE</option>
                        <option value="DAMASCO">DAMASCO</option>
                        <option value="CANGURO">CANGURO</option>
                    </select>
                </div>
                <div class="form-group"><label style="color: #e67e22;">Cant. Tiendas Objetivo 2</label><input type="number" id="shopsQty2"></div>
            </div>
        </div>

        <div class="section-title">1. Desempeño de Ventas - <span id="display-name-r1">Retailer 1</span></div>
        <div class="grid">
            <div class="form-group"><label>Meta Serie CAMON 50</label><input type="text" id="salesTarget"></div>
            <div class="form-group"><label>Venta Real Hoy</label><input type="number" id="todaySales"></div>
            <div class="form-group"><label>Acumulado del mes</label><input type="number" id="accumulatedSales"></div>
            <div class="form-group"><label>Cargado al DCR (%)</label><input type="text" id="dcrRate"></div>
        </div>

        <div class="section-title">2. Cobertura e Inventario - <span id="display-name-r1-cov">Retailer 1</span></div>
        <div class="grid">
            <div class="form-group"><label>Cobertura CN5c (C50 Pro)</label><input type="text" id="coverage50Pro"></div>
            <div class="form-group"><label>Cobertura CN7c (C50 Ultra)</label><input type="text" id="coverage50Ultra"></div>
        </div>

        <div id="sections-retailer-2" class="hidden">
            <div class="section-title" style="border-left-color: var(--tecno-orange); background: #fff3e0;">1.1 Desempeño de Ventas - <span id="display-name-r2">Retailer 2</span></div>
            <div class="grid">
                <div class="form-group"><label>Meta Serie CAMON 50</label><input type="text" id="salesTarget2"></div>
                <div class="form-group"><label>Venta Real Hoy</label><input type="number" id="todaySales2"></div>
                <div class="form-group"><label>Acumulado del mes</label><input type="number" id="accumulatedSales2"></div>
                <div class="form-group"><label>Cargado al DCR (%)</label><input type="text" id="dcrRate2"></div>
            </div>

            <div class="section-title" style="border-left-color: var(--tecno-orange); background: #fff3e0;">2.1 Cobertura e Inventario - <span id="display-name-r2-cov">Retailer 2</span></div>
            <div class="grid">
                <div class="form-group"><label>Cobertura CN5c (R2)</label><input type="text" id="coverage50Pro2"></div>
                <div class="form-group"><label>Cobertura CN7c (R2)</label><input type="text" id="coverage50Ultra2"></div>
            </div>
        </div>

        <div class="form-group" style="margin-top:15px;">
            <label>Problemas de Inventario</label>
            <textarea id="stockIssues" rows="2"></textarea>
        </div>

        <div class="section-title">3. Análisis de Mercado</div>
        <div class="grid">
            <div class="form-group">
                <label>Acciones Realizadas por la Competencia</label>
                <textarea id="competitorActions" rows="2"></textarea>
                <label style="margin-top: 10px; color: var(--tecno-blue);">Adjuntar Evidencia (Competencia)</label>
                <input type="file" id="compImageInput" accept="image/*" multiple onchange="handleCompImages(event)">
            </div>
            <div class="form-group"><label>Dinámica o Flujo de Mercado</label><textarea id="marketDynamics" rows="2"></textarea></div>
        </div>

        <div class="section-title">4. Resumen en tiendas <button type="button" class="btn-add" onclick="addStore()">+ Añadir</button></div>
        <div id="stores-container"></div>

        <div class="section-title">5. Evidencia Fotográfica (Tiendas)</div>
        <div class="form-group" style="margin-top:10px;"><input type="file" id="imageInput" accept="image/*" multiple onchange="handleImages(event)"></div>
        <div class="image-preview-container" id="imagePreview"></div>

        <div class="btn-group">
            <button type="button" class="btn-final" style="background: var(--tecno-green);" onclick="enviarAGoogleSheets()">Exportar Excel A La Nube</button>
            <button type="button" class="btn-final" style="background: #2b579a;" onclick="exportWord()">Descargar Word</button>
            <button type="button" class="btn-final" style="background: var(--wsp-green);" onclick="copiarWhatsApp()">Copiar para WhatsApp</button>
        </div>

        <div class="btn-group2">
            <a href="https://docs.google.com/spreadsheets/d/168u-0pUmNMGVExY8duQJksMGCAjfxyPd44q0P-ESoKk/edit?gid=0#gid=0" class="btn-final" style="background: #4dabf7; margin-top: 25px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                Ir a la Nube
            </a>
        </div>
    </form>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
    let photos = [];

    // Lógica Retailer 2
    function toggleSecondRetailer() {
        const rowName = document.getElementById('row-retailer-2');
        const sections = document.getElementById('sections-retailer-2');
        rowName.classList.toggle('hidden');
        sections.classList.toggle('hidden');
    }

    function updateRetailerTitles() {
        const r1 = document.getElementById('retailerName').value || "Retailer 1";
        const r2 = document.getElementById('retailerName2').value || "Retailer 2";
        document.getElementById('display-name-r1').innerText = r1;
        document.getElementById('display-name-r1-cov').innerText = r1;
        document.getElementById('display-name-r2').innerText = r2;
        document.getElementById('display-name-r2-cov').innerText = r2;
    }

    // Tiendas
    function addStore() {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'store-block';
        div.id = `store-${id}`;
        div.innerHTML = `
            <div class="grid">
                <div class="form-group">
                    <label>Tienda</label>
                    <select class="store-select" onchange="checkOtherShop(this, ${id})">
                        <option value="GLOBAL CELL">GLOBAL CELL</option>
                        <option value="TECNO CORP">TECNO CORP</option>
                        <option value="NC PHONE">NC PHONE</option>
                        <option value="DAMASCO">DAMASCO</option>
                        <option value="CANGURO">CANGURO</option>
                        <option value="OTHER SHOP">OTHER SHOP</option>
                    </select>
                    <input type="text" class="store-name-custom" id="custom-name-${id}" style="display:none; margin-top:10px;" placeholder="Escriba el nombre...">
                </div>
                <div class="form-group">
                    <label>Estatus</label>
                    <select class="store-status" onchange="toggleStoreFields(this, ${id})">
                        <option value="Informacion recopilada">Información recopilada</option>
                        <option value="Vitrina arreglada">Vitrina arreglada</option>
                        <option value="Ventas">Ventas</option>
                        <option value="Carga de stock">Carga de stock</option>
                    </select>
                </div>
            </div>
            <div class="form-group hidden" id="qty-container-${id}" style="margin-top:12px;">
                <label>Cantidad</label><input type="number" class="store-qty">
            </div>
            <textarea class="store-actions" style="margin-top:10px;" placeholder="Acciones realizadas..."></textarea>
            <button type="button" class="btn-remove" onclick="document.getElementById('store-${id}').remove()">Eliminar</button>
        `;
        document.getElementById('stores-container').appendChild(div);
    }

    function toggleStoreFields(select, id) {
        const qtyContainer = document.getElementById(`qty-container-${id}`);
        qtyContainer.classList.toggle('hidden', !["Ventas", "Carga de stock"].includes(select.value));
    }

    function checkOtherShop(select, id) {
        document.getElementById(`custom-name-${id}`).style.display = (select.value === "OTHER SHOP") ? "block" : "none";
    }

    function getStoreName(block) {
        const select = block.querySelector('.store-select');
        return (select.value === "OTHER SHOP") ? block.querySelector('.store-name-custom').value : select.value;
    }

    // Fotos
    function handleImages(e) { handleFiles(e.target.files, 'Vitrina Antes', ''); }
    function handleCompImages(e) { handleFiles(e.target.files, 'Competencia', 'Adjunto'); }
    function handleFiles(files, cat, tienda) {
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                photos.push({ src: ev.target.result, name: file.name, category: cat, tienda: tienda });
                renderPhotos();
            };
            reader.readAsDataURL(file);
        });
    }

    function renderPhotos() {
        const container = document.getElementById('imagePreview');
        container.innerHTML = '';
        photos.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'image-item';
            item.innerHTML = `
                <img src="${p.src}">
                <div class="image-controls">
                    <input type="text" placeholder="Ref" value="${p.tienda}" onchange="photos[${i}].tienda = this.value">
                    <button type="button" style="color:red; background:none; border:none; cursor:pointer;" onclick="photos.splice(${i},1); renderPhotos();">Borrar</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    // --- EXPORTACIÓN A LA NUBE (RESTAURADO) ---
    async function enviarAGoogleSheets() {
        if (!document.getElementById('staffName').value) { alert("Selecciona un especialista"); return; }
        const btn = event.target;
        btn.innerText = "Sincronizando..."; btn.disabled = true;

        const tiendasData = Array.from(document.querySelectorAll('.store-block')).map(b => ({
            nombre: getStoreName(b),
            estatus: b.querySelector('.store-status').value,
            cantidad: b.querySelector('.store-qty').value || "N/A",
            acciones: b.querySelector('.store-actions').value
        }));

        const datos = {
            fecha: document.getElementById('date').value,
            especialista: document.getElementById('staffName').value,
            cargo: document.getElementById('role').value,
            region: document.getElementById('region').value,
            // Retailer 1
            retailer: document.getElementById('retailerName').value,
            tiendasObjetivo: document.getElementById('shopsQty').value,
            metaCamon: document.getElementById('salesTarget').value,
            ventaHoy: document.getElementById('todaySales').value,
            acumulado: document.getElementById('accumulatedSales').value,
            dcr: document.getElementById('dcrRate').value,
            covPro: document.getElementById('coverage50Pro').value,
            covUltra: document.getElementById('coverage50Ultra').value,
            // Retailer 2
            retailer2: document.getElementById('retailerName2').value,
            tiendasObjetivo2: document.getElementById('shopsQty2').value,
            metaCamon2: document.getElementById('salesTarget2').value,
            ventaHoy2: document.getElementById('todaySales2').value,
            acumulado2: document.getElementById('accumulatedSales2').value,
            dcr2: document.getElementById('dcrRate2').value,
            covPro2: document.getElementById('coverage50Pro2').value,
            covUltra2: document.getElementById('coverage50Ultra2').value,
            
            probStock: document.getElementById('stockIssues').value,
            competencia: document.getElementById('competitorActions').value,
            dinamica: document.getElementById('marketDynamics').value,
            tiendas: tiendasData,
            fotos: photos
        };

        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzjFY3EJICcNvQI3VNqUej7uTehPvjEWRKZiU9g_-of1vuMvfYWu650-mlhWwmR_cXzDg/exec";
        try {
            await fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datos) });
            alert("¡Sincronización completa!");
        } catch (e) {
            alert("Error de conexión al servidor.");
        } finally {
            btn.innerText = "Exportar Excel A La Nube"; btn.disabled = false;
        }
    }

    // --- WORD (RESTAURADO CON R2) ---
    function exportWord() {
        const name = document.getElementById('staffName').value || 'Reporte';
        const date = document.getElementById('date').value;
        const r2Active = !document.getElementById('sections-retailer-2').classList.contains('hidden');
        
        let content = `<html><body><h2>REPORTE DIARIO TECNO</h2><p>Especialista: ${name}</p>`;
        content += `<h3>1. Ventas ${document.getElementById('retailerName').value}</h3><p>Hoy: ${document.getElementById('todaySales').value}</p>`;
        if(r2Active) content += `<h3>1.1 Ventas ${document.getElementById('retailerName2').value}</h3><p>Hoy: ${document.getElementById('todaySales2').value}</p>`;
        content += `</body></html>`;

        const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Reporte_${name}_${date}.doc`;
        link.click();
    }

    // --- WHATSAPP (RESTAURADO CON R2) ---
    function copiarWhatsApp() {
        const r1 = document.getElementById('retailerName').value || "R1";
        const r2 = document.getElementById('retailerName2').value || "R2";
        const isR2 = !document.getElementById('sections-retailer-2').classList.contains('hidden');

        let text = `_*Reporte Diario TECNO*_\n\n*Especialista:* ${document.getElementById('staffName').value}\n`;
        text += `\n*1. Ventas ${r1}:*\nHoy: ${document.getElementById('todaySales').value}\nAcumulado: ${document.getElementById('accumulatedSales').value}\n`;
        
        if(isR2) {
            text += `\n*1.1 Ventas ${r2}:*\nHoy: ${document.getElementById('todaySales2').value}\nAcumulado: ${document.getElementById('accumulatedSales2').value}\n`;
        }
        
        text += `\n*Mercado:* ${document.getElementById('marketDynamics').value}`;

        navigator.clipboard.writeText(text).then(() => alert("¡Copiado para WhatsApp!"));
    }

    addStore();
</script>
</body>
</html>
