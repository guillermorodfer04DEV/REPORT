<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner & QR Tool</title>
    
    <!-- Librerías para Escanear y Generar QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { 
            --bg: #0f172a; 
            --surface: #1e293b; 
            --surface-light: #334155; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --primary: #3b82f6; 
            --primary-active: #2563eb;
            --success: #10b981; 
            --success-active: #059669;
            --danger: #ef4444; 
            --accent: #475569;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container { 
            padding: 16px; 
            max-width: 800px; 
            margin: auto; 
        }

        /* --- Menú Principal --- */
        .main-menu-wrapper {
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-card {
            width: 100%; 
            max-width: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-light);
            border-radius: 32px; 
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .main-card h1 { 
            font-size: 26px; font-weight: 800; margin-bottom: 35px;
            color: var(--text);
        }

        /* Botón de volver en el menú principal */
        .btn-back-main {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
            color: var(--text); padding: 8px 12px; cursor: pointer;
            display: flex; align-items: center; gap: 5px; font-weight: bold;
            transition: background 0.2s;
        }
        .btn-back-main:hover { background: rgba(255,255,255,0.2); }

        /* Grid del menú escalable */
        .menu-grid {
            display: grid; gap: 20px;
            grid-template-columns: 1fr;
        }
        @media (min-width: 480px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }

        .btn-nav {
            background: var(--surface); 
            border: 1px solid var(--surface-light);
            border-radius: 24px; padding: 24px 16px;
            text-decoration: none; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            transition: var(--transition); font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-nav:hover, .btn-nav:active {
            transform: translateY(-5px); 
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }
        .btn-nav i { font-size: 40px; margin-bottom: 12px; font-style: normal; }

        /* --- Header de las Secciones --- */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            padding: 16px; text-align: center; border-bottom: 1px solid var(--surface-light);
            display: flex; align-items: center; justify-content: center;
            margin: -16px -16px 20px -16px; 
        }
        header h2 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        
        .btn-back { 
            position: absolute; left: 16px; background: transparent; border: none; 
            color: var(--primary); font-size: 1rem; padding: 8px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }

        /* --- Tarjetas y Formularios --- */
        .sale-card { 
            background: var(--surface); padding: 16px; border-radius: var(--radius); 
            margin-bottom: 16px; border: 1px solid var(--surface-light);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .sale-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--surface-light); }
        .sale-title { font-size: 1rem; font-weight: 600; color: var(--primary); margin:0;}
        .sale-actions { display: flex; gap: 8px; }
        
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer;}
        .btn-action-small { background: rgba(59, 130, 246, 0.1); color: var(--primary); border: none; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: background 0.2s;}
        .btn-action-small:hover { background: rgba(59, 130, 246, 0.2); }

        .form-control { 
            width: 100%; padding: 12px; border: 1px solid var(--surface-light); 
            border-radius: 12px; background: var(--bg); color: var(--text); 
            font-size: 1rem; box-sizing: border-box; outline: none;
            transition: border-color 0.2s; font-family: monospace;
            resize: vertical;
        }
        .form-control:focus { border-color: var(--primary); }
        .form-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        .btn { 
            padding: 14px; border: none; border-radius: 12px; cursor: pointer; 
            width: 100%; font-weight: bold; font-size: 1rem; color: white; 
            transition: transform 0.1s, background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* --- Listas --- */
        .scanned-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: var(--bg); border-radius: 12px;
            margin-bottom: 8px; border: 1px solid var(--surface-light);
        }
        .scanned-text { font-family: monospace; font-size: 1.1rem; word-break: break-all;}
        
        .qr-item { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .qr-item .equipo-name { font-size: 1.1rem; font-family: monospace; font-weight: bold; word-break: break-all;}
        .qr-item .qr-canvas { background: white; padding: 8px; border-radius: 8px; }

        /* --- Modales --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: var(--surface); padding: 24px; border-radius: 24px;
            width: 90%; max-width: 400px; border: 1px solid var(--surface-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        .modal-content h3 { margin-top: 0; color: var(--text); }
        
        #conflict-list { margin: 16px 0; max-height: 250px; overflow-y: auto; text-align: left; }

        .hidden { display: none !important; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--surface-light); }
        #reader video { border-radius: 12px; }
    </style>
</head>
<body>

    <!-- ================= MENÚ PRINCIPAL ================= -->
    <div id="view-menu" class="main-menu-wrapper">
        <div class="main-card">
            <!-- Botón que redirige a index.html -->
            <button class="btn-back-main" onclick="window.location.href='index.html'">
                ◀ Al Menú Principal
            </button>

            <h1>Seleccionar Modo</h1>
            <div class="menu-grid" id="menu-container">
                <!-- Se inyecta por JS usando el array -->
            </div>
        </div>
    </div>

    <!-- ================= SECCIÓN DE ESCÁNER ================= -->
    <div id="view-scanner" class="container hidden">
        <header>
            <button class="btn-back" onclick="switchView('view-menu')">◀ Volver</button>
            <h2>Escáner Inteligente</h2>
        </header>

        <div class="sale-card">
            <div id="reader"></div>
            <div style="margin-top: 16px;">
                <button class="btn btn-primary" id="btn-start" onclick="startScanner()">
                    📷 Iniciar Cámara
                </button>
                <button class="btn btn-danger hidden" id="btn-stop" onclick="stopScanner()">
                    🛑 Detener Cámara
                </button>
            </div>
        </div>

        <div class="sale-card">
            <div class="sale-header">
                <h3 class="sale-title">Listado (<span id="scan-count">0</span>)</h3>
                <div class="sale-actions">
                    <button class="btn-action-small" onclick="copyAllScans()">Copiar Todos</button>
                    <button class="btn-delete" onclick="clearScans()">Limpiar</button>
                </div>
            </div>
            <div id="scanned-list"></div>
        </div>
    </div>

    <!-- ================= SECCIÓN DE GENERADOR QR ================= -->
    <div id="view-generator" class="container hidden">
        <header>
            <button class="btn-back" onclick="switchView('view-menu')">◀ Volver</button>
            <h2>Generador Masivo QR</h2>
        </header>

        <div class="sale-card">
            <label class="form-label">Pega la lista de IMEIs (Separados por espacios, enter, guiones, comas, etc.)</label>
            <textarea id="imei-input" class="form-control" rows="6" placeholder="Ejemplo:&#10;355943370141915 355943370224844&#10;355943370154793-355943370092027"></textarea>
            <button class="btn btn-success" style="margin-top: 16px;" onclick="generateMassiveQR()">
                ⚙️ Generar Códigos QR
            </button>
        </div>

        <div id="qr-output-list"></div>
    </div>

    <!-- ================= MODAL: MÚLTIPLES CÓDIGOS DETECTADOS ================= -->
    <div id="conflict-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>⚠️ Múltiples Códigos Detectados</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted);">La cámara captó varios códigos al mismo tiempo. ¿Cuál deseas agregar?</p>
            <div id="conflict-list"></div>
            <button class="btn" style="background: var(--surface-light); margin-top: 10px;" onclick="closeConflictModal()">Cancelar</button>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script>
        // --- 1. CONFIGURACIÓN DEL MENÚ ESCALABLE ---
        // Aquí puedes agregar más herramientas a futuro
        const configBotonesHerramientas = [
            { nombre: "Escáner Inteligente", id: "view-scanner",  emoji: "📷" },
            { nombre: "Generador de QR",     id: "view-generator", emoji: "🔲" }
        ];

        function renderizarMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            
            configBotonesHerramientas.forEach(btn => {
                const item = document.createElement('div');
                item.className = 'btn-nav';
                item.onclick = () => switchView(btn.id);
                item.innerHTML = `<i>${btn.emoji}</i><span>${btn.nombre}</span>`;
                container.appendChild(item);
            });
        }
        renderizarMenu(); // Iniciar renderizado

        // --- 2. NAVEGACIÓN ---
        function switchView(viewId) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-scanner').classList.add('hidden');
            document.getElementById('view-generator').classList.add('hidden');
            
            if(viewId !== 'view-scanner' && html5QrCode) {
                stopScanner();
            }

            document.getElementById(viewId).classList.remove('hidden');
        }

        // --- 3. LÓGICA DEL ESCÁNER Y MULTI-DETECCIÓN ---
        let html5QrCode;
        let scannedSet = new Set();
        
        // Variables para el Buffer de Detección Múltiple
        let scanBuffer = new Set();
        let bufferTimer = null;
        let isModalOpen = false;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .then(() => {
                    document.getElementById('btn-start').classList.add('hidden');
                    document.getElementById('btn-stop').classList.remove('hidden');
                }).catch(err => alert("Error de cámara: " + err));
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('btn-start').classList.remove('hidden');
                    document.getElementById('btn-stop').classList.add('hidden');
                });
            }
        }

        // Función que capta los códigos de la cámara
        function onScanSuccess(decodedText) {
            // Si el modal está abierto o ya escaneamos este código, ignorar
            if (isModalOpen || scannedSet.has(decodedText)) return;
            
            scanBuffer.add(decodedText);
            
            // Si es la primera detección en este ciclo, iniciar ventana de tiempo de 500ms
            if (!bufferTimer) {
                playBeep(); // Feedback sonoro inmediato
                
                bufferTimer = setTimeout(() => {
                    if (scanBuffer.size === 1) {
                        // Solo se detectó 1 código en el rango de 500ms -> Agregar directo
                        commitScan(Array.from(scanBuffer)[0]);
                    } else if (scanBuffer.size > 1) {
                        // Se detectaron varios códigos casi al mismo tiempo -> Mostrar Modal
                        showConflictModal(Array.from(scanBuffer));
                    }
                    
                    // Limpiar buffer para el siguiente escaneo
                    scanBuffer.clear();
                    bufferTimer = null;
                }, 500);
            }
        }

        // Agrega definitivamente a la lista
        function commitScan(text) {
            if(scannedSet.has(text)) return;
            scannedSet.add(text);
            
            document.getElementById('scan-count').innerText = scannedSet.size;

            const list = document.getElementById('scanned-list');
            const item = document.createElement('div');
            item.className = 'scanned-item';
            item.innerHTML = `
                <span class="scanned-text">${text}</span>
                <button class="btn-action-small" onclick="copySingleText('${text}')">Copiar</button>
            `;
            list.insertBefore(item, list.firstChild);
        }

        // Mostrar el modal cuando hay múltiples QRs en pantalla
        function showConflictModal(codesArray) {
            isModalOpen = true;
            const listDiv = document.getElementById('conflict-list');
            listDiv.innerHTML = ''; // Limpiar
            
            codesArray.forEach(code => {
                const row = document.createElement('div');
                row.className = 'scanned-item';
                row.style.marginBottom = '5px';
                row.innerHTML = `
                    <span class="scanned-text" style="font-size:0.9rem;">${code}</span>
                    <button class="btn btn-success" style="width: auto; padding: 6px 12px; font-size:0.8rem;" onclick="resolveConflict('${code}')">Agregar</button>
                `;
                listDiv.appendChild(row);
            });
            
            document.getElementById('conflict-modal').classList.remove('hidden');
        }

        function resolveConflict(codeSelected) {
            commitScan(codeSelected);
            closeConflictModal();
        }

        function closeConflictModal() {
            document.getElementById('conflict-modal').classList.add('hidden');
            isModalOpen = false;
        }

        function clearScans() {
            scannedSet.clear();
            document.getElementById('scanned-list').innerHTML = '';
            document.getElementById('scan-count').innerText = '0';
        }

        function copySingleText(text) {
            navigator.clipboard.writeText(text).then(() => alert("Copiado: " + text));
        }

        // Nuevo botón: Copiar Todos los escaneos
        function copyAllScans() {
            if (scannedSet.size === 0) {
                alert("No hay códigos para copiar.");
                return;
            }
            const allText = Array.from(scannedSet).join('\n');
            navigator.clipboard.writeText(allText).then(() => {
                alert(`¡Se copiaron ${scannedSet.size} códigos al portapapeles!`);
            });
        }

        // --- 4. LÓGICA DEL GENERADOR DE QR ---
        function generateMassiveQR() {
            const input = document.getElementById('imei-input').value;
            const container = document.getElementById('qr-output-list');
            container.innerHTML = '';
            
            // Expresión Regular poderosa: Separa por cualquier espacio, salto de línea, coma, punto, guión, o tabulación.
            const lines = input.split(/[\s\n\r\t.,;-]+/).filter(line => line.trim() !== '');

            if(lines.length === 0) {
                alert("Por favor ingresa al menos un código o IMEI.");
                return;
            }

            lines.forEach(text => {
                const card = document.createElement('div');
                card.className = 'sale-card qr-item';
                card.innerHTML = `
                    <span class="equipo-name">${text}</span>
                    <div class="qr-canvas"></div>
                `;
                container.appendChild(card);

                new QRCode(card.querySelector('.qr-canvas'), {
                    text: text,
                    width: 100, 
                    height: 100,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });
        }
    </script>
</body>
</html>
