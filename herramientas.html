<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner & QR</title>
    <link rel="icon" type="image/png" href="TECNO-TOOL-icon.png">
    
    <!-- Librerías para Escanear y Generar QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Librería Tesseract.js para extraer texto de imágenes -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { 
            --bg: #0f172a; 
            --surface: #1e293b; 
            --surface-light: #334155; 
            --text: #f8fafc; 
            --text-muted: #94a3b8;
            --primary: #3b82f6; 
            --primary-active: #2563eb;
            --success: #10b981; 
            --success-active: #059669;
            --danger: #ef4444; 
            --accent: #475569;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container { 
            padding: 16px; 
            max-width: 800px; 
            margin: auto; 
        }

        /* --- Menú Principal --- */
        .main-menu-wrapper {
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-card {
            width: 100%; 
            max-width: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-light);
            border-radius: 32px; 
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .main-card h1 { 
            font-size: 26px; font-weight: 800; margin-bottom: 35px;
            color: var(--text);
        }

        .btn-back-main {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
            color: var(--text); padding: 8px 12px; cursor: pointer;
            display: flex; align-items: center; gap: 5px; font-weight: bold;
            transition: background 0.2s;
        }
        .btn-back-main:hover { background: rgba(255,255,255,0.2); }

        .menu-grid {
            display: grid; gap: 20px;
            grid-template-columns: 1fr;
        }
        @media (min-width: 480px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }

        .btn-nav {
            background: var(--surface); 
            border: 1px solid var(--surface-light);
            border-radius: 24px; padding: 24px 16px;
            text-decoration: none; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            transition: var(--transition); font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-nav:hover, .btn-nav:active {
            transform: translateY(-5px); 
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }
        .btn-nav i { font-size: 40px; margin-bottom: 12px; font-style: normal; }

        /* --- Header de las Secciones --- */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
            padding: 16px; text-align: center; border-bottom: 1px solid var(--surface-light);
            display: flex; align-items: center; justify-content: center;
            margin: -16px -16px 20px -16px; 
        }
        header h2 { margin: 0; font-size: 1.1rem; font-weight: 600; }
        
        .btn-back { 
            position: absolute; left: 16px; background: transparent; border: none; 
            color: var(--primary); font-size: 1rem; padding: 8px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
        }

        /* --- Tarjetas y Formularios --- */
        .sale-card { 
            background: var(--surface); padding: 16px; border-radius: var(--radius); 
            margin-bottom: 16px; border: 1px solid var(--surface-light);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .sale-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--surface-light); flex-wrap: wrap; gap: 10px; }
        .sale-title { font-size: 1rem; font-weight: 600; color: var(--primary); margin:0;}
        .sale-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer;}
        .btn-action-small { background: rgba(59, 130, 246, 0.1); color: var(--text); border: none; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: background 0.2s;}
        .btn-action-small:hover { background: rgba(59, 130, 246, 0.2); }

        .form-control { 
            width: 100%; padding: 12px; border: 1px solid var(--surface-light); 
            border-radius: 12px; background: var(--bg); color: var(--text); 
            font-size: 1rem; box-sizing: border-box; outline: none;
            transition: border-color 0.2s; font-family: monospace;
            resize: vertical;
        }
        .form-control:focus { border-color: var(--primary); }
        .form-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        .btn { 
            padding: 14px; border: none; border-radius: 12px; cursor: pointer; 
            width: 100%; font-weight: bold; font-size: 1rem; color: white; 
            transition: transform 0.1s, background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* --- Listas --- */
        .scanned-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: var(--bg); border-radius: 12px;
            margin-bottom: 8px; border: 1px solid var(--surface-light);
            word-break: break-all;
        }
        .scanned-text { font-family: monospace; font-size: 1.05rem; flex: 1; margin-right: 10px; }
        .index-badge { color: var(--primary); font-weight: bold; margin-right: 8px; font-size: 0.9rem;}
        
        .qr-item { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .qr-item .equipo-name { font-size: 1.1rem; font-family: monospace; font-weight: bold; word-break: break-all;}
        .qr-item .qr-canvas { background: white; padding: 8px; border-radius: 8px; }

        /* --- Globo del Buffer Multi-Escaneo --- */
        #conflict-bubble {
            background: var(--surface-light);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        #conflict-bubble::before {
            content: ''; position: absolute; top: -6px; left: 20px;
            width: 10px; height: 10px; background: var(--surface-light);
            border-top: 1px solid var(--primary); border-left: 1px solid var(--primary);
            transform: rotate(45deg);
        }
        #conflict-list { max-height: 200px; overflow-y: auto; margin-top: 8px; }

        .hidden { display: none !important; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--surface-light); }
        #reader video { border-radius: 12px; }
        
        /* Contenedores de canvas generados dinámicamente */
        .image-preview-container {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--surface-light);
        }
        .image-preview-container canvas {
            display: block;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- ================= MENÚ PRINCIPAL ================= -->
    <div id="view-menu" class="main-menu-wrapper">
        <div class="main-card">
            <button class="btn-back-main" onclick="window.location.href='index.html'">
                ◀ Al Menú Principal
            </button>

            <h1>Seleccionar Modo</h1>
            <div class="menu-grid" id="menu-container">
                <!-- Se inyecta por JS -->
            </div>
        </div>
    </div>

    <!-- ================= SECCIÓN DE ESCÁNER DE CÁMARA ================= -->
    <div id="view-scanner" class="container hidden">
        <header>
            <button class="btn-back" onclick="switchView('view-menu')">◀ Volver</button>
            <h2>Escáner Inteligente</h2>
        </header>

        <div class="sale-card">
            <div id="reader"></div>
            
            <div id="conflict-bubble" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.85rem; font-weight: bold; color: var(--danger);">⚠️ Varios detectados. Elige uno:</span>
                    <button class="btn-delete" style="padding: 2px 8px; background: transparent; color: var(--text-muted);" onclick="closeConflictMenu()">✖</button>
                </div>
                <div id="conflict-list"></div>
            </div>

            <div style="margin-top: 16px;">
                <button class="btn btn-primary" id="btn-start" onclick="startScanner()">
                    📷 Iniciar Cámara
                </button>
                <button class="btn btn-danger hidden" id="btn-stop" onclick="stopScanner()">
                    🛑 Detener Cámara
                </button>
            </div>
        </div>

        <div class="sale-card">
            <div class="sale-header">
                <h3 class="sale-title">Listado (<span id="scan-count">0</span>)</h3>
                <div class="sale-actions">
                    <button class="btn-action-small" onclick="sendToQRGenerator()">🔲 Enviar a QR</button>
                    <button class="btn-action-small" onclick="copyAllScans()">📋 Copiar</button>
                    <button class="btn-delete" onclick="clearScans()">🗑️ Limpiar</button>
                </div>
            </div>
            <div id="scanned-list"></div>
        </div>
    </div>

    <!-- ================= SECCIÓN DE ESCÁNER DE IMÁGENES ================= -->
    <div id="view-image-scanner" class="container hidden">
        <header>
            <button class="btn-back" onclick="switchView('view-menu')">◀ Volver</button>
            <h2>Extraer de Imágenes</h2>
        </header>

        <div class="sale-card">
            <input type="file" id="image-upload" multiple accept="image/*" class="hidden" onchange="processImages(event)">
            <button class="btn btn-primary" onclick="document.getElementById('image-upload').click()">
                📁 Seleccionar Imagen(es)
            </button>
            <div id="processing-status" style="margin-top: 12px; font-size: 0.9rem; font-weight: bold; color: var(--success); text-align: center;"></div>
            
            <div id="canvas-container" style="margin-top: 16px;">
                <!-- Las imágenes con los cuadros dibujados irán aquí -->
            </div>
        </div>

        <div class="sale-card">
            <div class="sale-header">
                <h3 class="sale-title">Extraídos (<span id="img-scan-count">0</span>)</h3>
                <div class="sale-actions">
                    <button class="btn-action-small" onclick="sendImgScansToQR()">🔲 Enviar a QR</button>
                    <button class="btn-action-small" onclick="copyAllImgScans()">📋 Copiar</button>
                    <button class="btn-delete" onclick="clearImgScans()">🗑️ Limpiar</button>
                </div>
            </div>
            <div id="img-scanned-list"></div>
        </div>
    </div>

    <!-- ================= SECCIÓN DE GENERADOR QR ================= -->
    <div id="view-generator" class="container hidden">
        <header>
            <button class="btn-back" onclick="switchView('view-menu')">◀ Volver</button>
            <h2>Generador Masivo QR</h2>
        </header>

        <div class="sale-card">
            <label class="form-label">Pega la lista de IMEIs (Separados por espacios, enter, guiones, etc.)</label>
            <textarea id="imei-input" class="form-control" rows="6" placeholder="Ejemplo:&#10;355943370141915 355943370224844"></textarea>
            <button class="btn btn-success" style="margin-top: 16px;" onclick="generateMassiveQR()">
                ⚙️ Generar Códigos QR
            </button>
        </div>

        <div class="sale-card">
            <div class="sale-header" style="border:none; margin:0; padding:0;">
                <h3 class="sale-title">Resultados (<span id="qr-count">0</span> extraídos)</h3>
            </div>
        </div>

        <div id="qr-output-list"></div>
    </div>


    <!-- ================= SCRIPTS ================= -->
    <script>
        // --- 1. CONFIGURACIÓN DEL MENÚ ESCALABLE ---
        const configBotonesHerramientas = [
            { nombre: "Escáner Inteligente", id: "view-scanner",       emoji: "📷" },
            { nombre: "Extraer de Imágenes", id: "view-image-scanner", emoji: "🖼️" },
            { nombre: "Generador de QR",     id: "view-generator",     emoji: "🔲" }
        ];

        function renderizarMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            configBotonesHerramientas.forEach(btn => {
                const item = document.createElement('div');
                item.className = 'btn-nav';
                item.onclick = () => switchView(btn.id);
                item.innerHTML = `<i>${btn.emoji}</i><span>${btn.nombre}</span>`;
                container.appendChild(item);
            });
        }
        renderizarMenu();

        // --- 2. NAVEGACIÓN ---
        function switchView(viewId) {
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-scanner').classList.add('hidden');
            document.getElementById('view-image-scanner').classList.add('hidden');
            document.getElementById('view-generator').classList.add('hidden');
            
            if(viewId !== 'view-scanner' && html5QrCode) {
                stopScanner();
                closeConflictMenu();
            }

            document.getElementById(viewId).classList.remove('hidden');
        }

        // =========================================================
        // =           LÓGICA DEL ESCÁNER DE CÁMARA                =
        // =========================================================
        let html5QrCode;
        let scannedSet = new Set();
        let scanBuffer = new Set();
        let bufferTimer = null;
        let isConflictOpen = false;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .then(() => {
                    document.getElementById('btn-start').classList.add('hidden');
                    document.getElementById('btn-stop').classList.remove('hidden');
                }).catch(err => alert("Error de cámara: " + err));
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('btn-start').classList.remove('hidden');
                    document.getElementById('btn-stop').classList.add('hidden');
                });
            }
        }

        function onScanSuccess(decodedText) {
            if (isConflictOpen || scannedSet.has(decodedText)) return;
            scanBuffer.add(decodedText);
            
            if (!bufferTimer) {
                playBeep();
                bufferTimer = setTimeout(() => {
                    if (scanBuffer.size === 1) {
                        commitScan(Array.from(scanBuffer)[0]);
                    } else if (scanBuffer.size > 1) {
                        showConflictMenu(Array.from(scanBuffer));
                    }
                    scanBuffer.clear();
                    bufferTimer = null;
                }, 200);
            }
        }

        function renderScannedList() {
            const list = document.getElementById('scanned-list');
            list.innerHTML = '';
            const arr = Array.from(scannedSet).reverse();
            
            arr.forEach(text => {
                const item = document.createElement('div');
                item.className = 'scanned-item';
                item.innerHTML = `
                    <span class="scanned-text">${text}</span>
                    <div class="sale-actions" style="gap: 4px;">
                        <button class="btn-action-small" onclick="copySingleText('${text}')" title="Copiar">📋</button>
                        <button class="btn-action-small" style="background: rgba(239, 68, 68, 0.1);" onclick="deleteSingleScan('${text}')" title="Eliminar">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });
            document.getElementById('scan-count').innerText = scannedSet.size;
        }

        function commitScan(text) {
            if(scannedSet.has(text)) return;
            scannedSet.add(text);
            renderScannedList();
        }

        function deleteSingleScan(text) {
            scannedSet.delete(text);
            renderScannedList();
        }

        function clearScans() {
            scannedSet.clear();
            renderScannedList();
        }

        function copySingleText(text) {
            navigator.clipboard.writeText(text).then(() => alert("Copiado: " + text));
        }

        function copyAllScans() {
            if (scannedSet.size === 0) return alert("No hay códigos para copiar.");
            const allText = Array.from(scannedSet).reverse().join('\n');
            navigator.clipboard.writeText(allText).then(() => {
                alert(`¡Se copiaron ${scannedSet.size} códigos al portapapeles!`);
            });
        }

        function sendToQRGenerator() {
            if (scannedSet.size === 0) return alert("No hay códigos en la lista para enviar.");
            const allText = Array.from(scannedSet).reverse().join('\n');
            document.getElementById('imei-input').value = allText;
            switchView('view-generator');
            generateMassiveQR();
        }

        function showConflictMenu(codesArray) {
            isConflictOpen = true;
            const bubble = document.getElementById('conflict-bubble');
            const listDiv = document.getElementById('conflict-list');
            listDiv.innerHTML = ''; 
            
            codesArray.forEach(code => {
                const row = document.createElement('div');
                row.className = 'scanned-item';
                row.style.marginBottom = '5px';
                row.style.padding = '8px';
                row.innerHTML = `
                    <span class="scanned-text" style="font-size:0.9rem;">${code}</span>
                    <button class="btn btn-success" style="width: auto; padding: 4px 8px; font-size:0.8rem;" onclick="resolveConflict('${code}')">Agregar</button>
                `;
                listDiv.appendChild(row);
            });
            bubble.classList.remove('hidden');
        }

        function resolveConflict(codeSelected) {
            commitScan(codeSelected);
            closeConflictMenu();
        }

        function closeConflictMenu() {
            document.getElementById('conflict-bubble').classList.add('hidden');
            isConflictOpen = false;
        }


        // =========================================================
        // =         LÓGICA DEL ESCÁNER DE IMÁGENES (NUEVO)        =
        // =========================================================
        let imageScannedData = [];
        let globalImeiCounter = 0;
        let globalImageCounter = 0;

        async function processImages(event) {
            const files = event.target.files;
            if (!files.length) return;
            
            const statusDiv = document.getElementById('processing-status');
            const canvasContainer = document.getElementById('canvas-container');
            
            for (let i = 0; i < files.length; i++) {
                globalImageCounter++;
                let currentImgIndex = globalImageCounter;
                statusDiv.innerText = `Procesando imagen ${i + 1} de ${files.length} (Por favor, espera)...`;
                
                const file = files[i];
                const img = new Image();
                img.src = URL.createObjectURL(file);
                
                await new Promise(resolve => img.onload = resolve);
                
                // Creamos el contenedor y el canvas para la previsualización
                const previewWrapper = document.createElement('div');
                previewWrapper.className = 'image-preview-container';
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                previewWrapper.appendChild(canvas);

                // Ejecutamos Tesseract
                const result = await Tesseract.recognize(img, 'eng');
                const words = result.data.words;
                
                let foundAny = false;

                // Analizamos cada palabra detectada en la imagen
                words.forEach(word => {
                    // Limpiamos la palabra de símbolos raros, dejamos solo números
                    let textClean = word.text.replace(/\D/g, ''); 
                    
                    // Comprobamos si tiene longitud típica de un IMEI (14 a 17 dígitos)
                    if (textClean.length >= 14 && textClean.length <= 17) {
                        globalImeiCounter++;
                        foundAny = true;
                        
                        // Guardamos los datos
                        const id = Date.now() + Math.random().toString(36).substr(2, 9);
                        imageScannedData.push({
                            id: id,
                            text: textClean,
                            imgIndex: currentImgIndex,
                            imeiIndex: globalImeiCounter
                        });

                        // Dibujar recuadro rojo en el punto exacto
                        const bbox = word.bbox;
                        const lineWidth = Math.max(2, img.width / 200);
                        const fontSize = Math.max(16, img.width / 40);

                        ctx.beginPath();
                        ctx.rect(bbox.x0, bbox.y0, bbox.x1 - bbox.x0, bbox.y1 - bbox.y0);
                        ctx.lineWidth = lineWidth;
                        ctx.strokeStyle = '#ef4444'; // Rojo (var(--danger))
                        ctx.stroke();
                        
                        // Dibujar el número encima del recuadro
                        ctx.font = `bold ${fontSize}px monospace`;
                        ctx.fillStyle = '#ef4444';
                        ctx.fillText(`IMEI ${globalImeiCounter}`, bbox.x0, bbox.y0 - (fontSize/2));
                    }
                });

                if (foundAny) {
                    canvasContainer.appendChild(previewWrapper);
                } else {
                    const noRes = document.createElement('div');
                    noRes.style.padding = "8px";
                    noRes.style.color = "var(--danger)";
                    noRes.style.fontSize = "0.9rem";
                    noRes.innerText = `Imagen ${currentImgIndex}: No se encontraron IMEIs legibles.`;
                    canvasContainer.appendChild(noRes);
                }
                
                // Actualizamos la lista a medida que terminamos una imagen
                renderImgScannedList();
            }
            
            statusDiv.innerText = `✅ ¡Procesamiento completado!`;
            setTimeout(() => { statusDiv.innerText = ''; }, 3000);
            
            // Limpiamos el input para que permita subir las mismas fotos si se desea
            event.target.value = ""; 
        }

        function renderImgScannedList() {
            const list = document.getElementById('img-scanned-list');
            list.innerHTML = '';
            
            imageScannedData.forEach(item => {
                const row = document.createElement('div');
                row.className = 'scanned-item';
                row.innerHTML = `
                    <span class="scanned-text">
                        <span class="index-badge">(${item.imgIndex}. ${item.imeiIndex}.)</span> ${item.text}
                    </span>
                    <div class="sale-actions" style="gap: 4px;">
                        <button class="btn-action-small" onclick="copySingleText('${item.text}')" title="Copiar">📋</button>
                        <button class="btn-action-small" style="background: rgba(239, 68, 68, 0.1);" onclick="deleteImgScan('${item.id}')" title="Eliminar">🗑️</button>
                    </div>
                `;
                list.appendChild(row);
            });
            document.getElementById('img-scan-count').innerText = imageScannedData.length;
        }

        function deleteImgScan(id) {
            imageScannedData = imageScannedData.filter(item => item.id !== id);
            renderImgScannedList();
        }

        function copyAllImgScans() {
            if (imageScannedData.length === 0) return alert("No hay IMEIs extraídos para copiar.");
            // Copia solo los números de IMEI
            const allText = imageScannedData.map(item => item.text).join('\n');
            navigator.clipboard.writeText(allText).then(() => {
                alert(`¡Se copiaron ${imageScannedData.length} códigos al portapapeles!`);
            });
        }

        function clearImgScans() {
            imageScannedData = [];
            globalImeiCounter = 0;
            globalImageCounter = 0;
            document.getElementById('canvas-container').innerHTML = '';
            renderImgScannedList();
        }

        function sendImgScansToQR() {
            if (imageScannedData.length === 0) return alert("No hay códigos extraídos para enviar.");
            const allText = imageScannedData.map(item => item.text).join('\n');
            document.getElementById('imei-input').value = allText;
            switchView('view-generator');
            generateMassiveQR();
        }


        // =========================================================
        // =               LÓGICA DEL GENERADOR QR                 =
        // =========================================================
        function generateMassiveQR() {
            const input = document.getElementById('imei-input').value;
            const container = document.getElementById('qr-output-list');
            container.innerHTML = '';
            
            const lines = input.split(/[\s\n\r\t.,;-]+/).filter(line => line.trim() !== '');

            document.getElementById('qr-count').innerText = lines.length;

            if(lines.length === 0) {
                alert("Por favor ingresa al menos un código o IMEI.");
                return;
            }

            lines.forEach((text, index) => {
                const card = document.createElement('div');
                card.className = 'sale-card qr-item';
                card.innerHTML = `
                    <span class="equipo-name" style="color: var(--primary);">${index + 1}. <span style="color: var(--text);">${text}</span></span>
                    <div class="qr-canvas"></div>
                `;
                container.appendChild(card);

                new QRCode(card.querySelector('.qr-canvas'), {
                    text: text,
                    width: 100, 
                    height: 100,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });
        }
    </script>
</body>
</html>
